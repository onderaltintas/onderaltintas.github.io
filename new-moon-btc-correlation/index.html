<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BTC Yeni Ay Analizi</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        body { margin: 0; background: #0b0e11; color: #d1d4dc; font-family: sans-serif; padding: 20px; }
        #chart { width: 100%; height: 600px; border: 1px solid #2b2f36; }
        .ui { margin-bottom: 10px; display: flex; gap: 10px; }
        input { background: #1e222d; border: 1px solid #363c4e; color: white; padding: 5px; }
        button { background: #2962ff; color: white; border: none; padding: 6px 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="ui">
    <input type="date" id="start" value="2024-01-01">
    <button id="run">Analiz Et</button>
</div>
<div id="chart"></div>

<script>
    // 1. Chart Tanımı
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { background: { color: '#0b0e11' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
        timeScale: { borderColor: '#2b2f36' }
    });

    // HATA ÇÖZÜMÜ: v4 Standalone versiyonunda en garantili seri ekleme metodu budur.
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', 
        borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

    async function runAnalysis() {
        const startVal = document.getElementById('start').value;
        const startTimestamp = new Date(startVal).getTime();
        
        // 2. Binance Verisi
        try {
            const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&startTime=${startTimestamp}&limit=1000`);
            const candles = await resp.json();
            const data = candles.map(c => ({
                time: c[0] / 1000,
                open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]), close: parseFloat(c[4])
            }));
            candleSeries.setData(data);

            // 3. Astronomik Hesaplama
            const markers = [];
            let searchDate = new Date(startTimestamp);
            const now = new Date();

            while (searchDate < now) {
                const nm = Astronomy.SearchMoonPhase(Astronomy.Phase.New, searchDate, 35);
                if (!nm) break;

                const moonUnix = Math.floor(nm.date.getTime() / 1000);
                const dayIdx = data.findIndex(d => Math.abs(d.time - moonUnix) < 43200);

                if (dayIdx !== -1) {
                    const startPrice = data[dayIdx].close;
                    let color = "#fcd34d";
                    let label = "🌑";

                    if (dayIdx + 4 < data.length) {
                        const endPrice = data[dayIdx + 4].close;
                        if (endPrice < startPrice) {
                            color = "#ef5350"; // Düşüş
                            label = "🌑 📉";
                        } else {
                            color = "#26a69a"; // Yükseliş
                            label = "🌑 📈";
                        }
                    }

                    markers.push({
                        time: data[dayIdx].time,
                        position: 'aboveBar',
                        color: color,
                        shape: 'arrowDown',
                        text: label
                    });
                }
                searchDate = new Date(nm.date.getTime() + 25 * 24 * 60 * 60 * 1000);
            }
            candleSeries.setMarkers(markers);
            chart.timeScale().fitContent();

        } catch (err) {
            console.error("Veri çekme hatası:", err);
        }
    }

    document.getElementById('run').addEventListener('click', runAnalysis);
    runAnalysis();
</script>
</body>
</html>
