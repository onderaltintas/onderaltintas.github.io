<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BTC Yeni Ay Analizi (Kesin Çözüm)</title>
    <script>
        // lightweight-charts.standalone.production.js v4.1.1 (Minified)
        /*! @license Apache-2.0 */
        !function(t,e){"object"==typeof exports&&"undefined"!=typeof module?e(exports):"function"==typeof define&&define.amd?define(["exports"],e):e((t="undefined"!=typeof globalThis?globalThis:t||self).LightweightCharts={})}(this,(function(t){"use strict";var e,i;!function(t){t[t.Bar=0]="Bar",t[t.Candlestick=1]="Candlestick",t[t.Area=2]="Area",t[t.Line=3]="Line",t[t.Baseline=4]="Baseline",t[t.Histogram=5]="Histogram"}(e||(e={})),function(t){t[t.Normal=0]="Normal",t[t.Magnet=1]="Magnet"}(i||(i={}));
        // ... (Kütüphanenin geri kalanı, boyutu çok büyük olduğu için buraya eklenemedi, ancak CDN linki çalışacaktır.)
    </script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        body { margin: 0; padding: 20px; background-color: #101217; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        h2 { margin-top: 0; margin-bottom: 5px; color: #f0b90b; }
        p { margin-top: 0; margin-bottom: 20px; color: #848e9c; font-size: 14px; }
        #chart { width: 100%; height: calc(100vh - 100px); min-height: 500px; border: 1px solid #2a2e39; border-radius: 4px; box-sizing: border-radius; overflow: hidden; }
    </style>
</head>
<body>
    <h2>Bitcoin Yeni Ay (New Moon) + 4 Günlük Eğilim Grafiği</h2>
    <p>Mavi oklar (NM) Yeni Ay günlerini, <b>Sarı Kesikli Çizgiler</b> ise takip eden 4 günlük fiyat eğimini gösterir. Fiyat verisi Binance API'den alınmaktadır.</p>
    
    <div id="chart"></div>

    <script>
        function renderChart() {
            const chartElement = document.getElementById('chart');
            if (!chartElement) return;

            // Grafik oluşturma seçenekleri
            const chartOptions = {
                width: chartElement.clientWidth,
                height: chartElement.clientHeight,
                layout: {
                    background: { color: '#101217' },
                    textColor: '#d1d4dc',
                    fontSize: 12,
                },
                grid: {
                    vertLines: { color: '#1e222d' },
                    horzLines: { color: '#1e222d' },
                },
                crosshair: {
                    mode: 0, // Normal mod
                    vertLine: { color: '#758696', width: 1, style: 3 },
                    horzLine: { color: '#758696', width: 1, style: 3 },
                },
                timeScale: {
                    borderColor: '#2a2e39',
                    timeVisible: true,
                    secondsVisible: false,
                },
                priceScale: {
                    borderColor: '#2a2e39',
                },
            };

            const chart = LightweightCharts.createChart(chartElement, chartOptions);
            
            // Mum grafiği serisi (Candlestick)
            const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });

            // Astronomik Yeni Ay hesaplaması (Referans: 11 Ocak 2024, 11:57 UTC)
            const knownNewMoon = new Date('2024-01-11T11:57:00Z').getTime();
            const lunarMonth = 29.530588853 * 24 * 60 * 60 * 1000;

            function isNewMoon(timestamp) {
                const diff = Math.abs(timestamp - knownNewMoon);
                const cyclePos = (diff % lunarMonth) / lunarMonth;
                return cyclePos < 0.02 || cyclePos > 0.98; // %2 tolerans
            }

            // Veri çekme ve işleme
            async function loadData() {
                try {
                    // Binance'den son 500 günlük BTCUSDT verisini çek
                    const response = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=500');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();

                    // Veriyi formatla
                    const chartData = data.map(d => ({
                        time: d[0] / 1000, // Unix timestamp (saniye)
                        open: parseFloat(d[1]),
                        high: parseFloat(d[2]),
                        low: parseFloat(d[3]),
                        close: parseFloat(d[4])
                    }));

                    // Mum verisini ayarla
                    candleSeries.setData(chartData);

                    const markers = [];
                    
                    // Her veri noktasını kontrol et
                    chartData.forEach((currentPoint, i) => {
                        // Yeni Ay günlerini bul
                        if (isNewMoon(currentPoint.time * 1000)) {
                            // 1. Yeni Ay İşareti Ekle
                            markers.push({
                                time: currentPoint.time,
                                position: 'belowBar',
                                color: '#2196F3',
                                shape: 'arrowUp',
                                text: 'NM'
                            });

                            // 2. 4 Günlük Eğimi Çiz
                            // Grafikte yeterli veri varsa eğim serisi oluştur
                            if (i + 4 < chartData.length) {
                                // Her eğim için yeni bir LineSeries ekle (bu v4 standartıdır)
                                const trendSeries = chart.addSeries(LightweightCharts.LineSeries, {
                                    color: '#FFD700', // Sarı
                                    lineWidth: 2,
                                    lineStyle: 2, // Kesikli
                                    lastValueVisible: false,
                                    priceLineVisible: false,
                                    crosshairMarkerVisible: false,
                                });

                                // Eğim verisini (Yeni Ay günü + 4 gün) oluştur
                                const trendData = [];
                                for (let j = 0; j <= 4; j++) {
                                    trendData.push({
                                        time: chartData[i + j].time,
                                        value: chartData[i + j].close // Kapanış fiyatını kullan
                                    });
                                }
                                trendSeries.setData(trendData);
                            }
                        }
                    });
                    
                    // İşaretçileri muma ekle
                    candleSeries.setMarkers(markers);
                    // Grafiği sığdır
                    chart.timeScale().fitContent();

                } catch (error) {
                    console.error("Grafik verisi yüklenemedi:", error);
                    chartElement.innerHTML = '<div style="color:red; padding: 20px;">Veri yükleme hatası. Lütfen internet bağlantınızı kontrol edin veya sayfayı yenileyin.</div>';
                }
            }

            loadData();

            // Pencere boyutu değiştiğinde grafiği yeniden boyutlandır
            window.addEventListener('resize', () => {
                chart.applyOptions({ 
                    width: chartElement.clientWidth,
                    height: chartElement.clientHeight
                });
            });
        }

        // DOM yüklendiğinde grafiği çiz
        document.addEventListener('DOMContentLoaded', renderChart);
    </script>
</body>
</html>
