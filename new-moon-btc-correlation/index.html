<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BTC & Yeni Ay Analizi (Tam Dinamik)</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #131722; color: #d1d4dc; }
        #chart { width: 100%; height: 600px; }
        .controls { margin-bottom: 20px; display: flex; gap: 15px; background: #1e222d; padding: 15px; border-radius: 8px; }
        input { background: #2a2e39; border: 1px solid #363c4e; color: white; padding: 5px; border-radius: 4px; }
        button { background: #2962ff; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="controls">
    <label>Başlangıç: <input type="date" id="startDate" value="2023-01-01"></label>
    <button onclick="updateAnalysis()">Analiz Et</button>
</div>
<div id="chart"></div>

<script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
        timeScale: { borderColor: '#363c4e' }
    });
    const candleSeries = chart.addCandlestickSeries();

    async function updateAnalysis() {
        const startStr = document.getElementById('startDate').value;
        const startTime = new Date(startStr).getTime();
        
        // 1. Binance API'den gerçek BTC verisi çek (Günlük)
        const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&startTime=${startTime}&limit=1000`);
        const rawData = await response.json();
        const btcData = rawData.map(d => ({
            time: d[0] / 1000,
            open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4])
        }));
        candleSeries.setData(btcData);

        // 2. Astronomik Yeni Ay Hesaplama
        const markers = [];
        let datePtr = new Date(startStr);
        const endPtr = new Date();

        while (datePtr < endPtr) {
            // Astronomy Engine ile en yakın yeni ayı bul
            const nm = Astronomy.SearchMoonPhase(Astronomy.Phase.New, datePtr, 40);
            if (nm) {
                const moonDate = nm.date;
                const timeStamp = Math.floor(moonDate.getTime() / 1000);
                
                // Sadece verimizde olan tarihler için işaret koy
                const candle = btcData.find(d => Math.abs(d.time - timeStamp) < 43200); // 12 saat tolerans
                
                if (candle) {
                    // Yeni Ay Sonrası 4 Günlük Eğimi Hesapla
                    const candleIndex = btcData.indexOf(candle);
                    let trendEmoji = "🌑";
                    let trendColor = "#fcd34d";

                    if (candleIndex + 4 < btcData.length) {
                        const priceThen = btcData[candleIndex + 4].close;
                        if (priceThen < candle.close) {
                            trendEmoji = "🌑 📉"; // Düşüş
                            trendColor = "#ff5252";
                        } else {
                            trendEmoji = "🌑 📈"; // Yükseliş
                            trendColor = "#00e676";
                        }
                    }

                    markers.push({
                        time: candle.time,
                        position: 'aboveBar',
                        color: trendColor,
                        shape: 'arrowDown',
                        text: trendEmoji
                    });
                }
                // Bir sonraki ay döngüsüne atla
                datePtr = new Date(moonDate.getTime() + 25 * 24 * 60 * 60 * 1000);
            } else { break; }
        }
        candleSeries.setMarkers(markers);
        chart.timeScale().fitContent();
    }

    // İlk yükleme
    updateAnalysis();
</script>
</body>
</html>
