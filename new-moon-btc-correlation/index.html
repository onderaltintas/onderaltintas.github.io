<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BTC Yeni Ay Analizi</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #f4f7f6; }
        #chart-container { width: 100%; height: 500px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>

<h2>Bitcoin Fiyatı ve Yeni Ay Etkisi (Analiz)</h2>
<div id="chart-container"></div>

<script>
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { background: { color: '#ffffff' }, textColor: '#333' },
        grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { borderColor: '#cccccc' },
    });

    const lineSeries = chart.addLineSeries({
        color: '#2962FF',
        lineWidth: 2,
    });

    // Örnek BTC Verisi (Zaman damgası: YYYY-MM-DD)
    const data = [
        { time: '2026-03-01', value: 65000 }, { time: '2026-03-02', value: 66000 },
        { time: '2026-03-03', value: 64500 }, { time: '2026-03-04', value: 63000 },
        { time: '2026-03-05', value: 62000 }, { time: '2026-03-10', value: 68000 },
        { time: '2026-03-15', value: 70000 }, { time: '2026-03-18', value: 72000 },
        { time: '2026-03-25', value: 69000 }, { time: '2026-03-29', value: 67000 },
        { time: '2026-03-30', value: 66500 }, { time: '2026-04-05', value: 71000 }
    ];
    lineSeries.setData(data);

    // Yeni Ay Tarihleri ve İşaretleyiciler
    const markers = [
        { time: '2026-03-03', position: 'aboveBar', color: '#000', shape: 'circle', text: '🌑 New Moon' },
        { time: '2026-03-29', position: 'aboveBar', color: '#000', shape: 'circle', text: '🌑 New Moon' }
    ];
    lineSeries.setMarkers(markers);

    // Yeni Ay sonrası 4 günlük trendi göstermek için PriceLine kullanımı
    // Mart Ayı Örneği: 3 Mart'tan sonraki düşüş eğilimi çizgisi
    lineSeries.createPriceLine({
        price: 64500,
        color: 'red',
        lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        axisLabelVisible: true,
        title: 'Trend Start',
    });

    chart.timeScale().fitContent();
</script>
</body>
</html>
