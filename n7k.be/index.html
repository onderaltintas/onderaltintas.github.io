<style>
:root {
  --bg: #f6f5f2;
  --card: #ffffff;
  --text: #1f1f1f;
  --muted: #6e6e6e;
  --accent: #111111;
  --warm: #b55a2a;
  --radius: 26px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--bg);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  z-index: 1000;
}

.brand {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -1px;
}

.brand span {
  color: var(--warm);
}

.nav-group {
  display: flex;
  gap: 10px;
}

.nav-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;
}

.share-btn {
  background: var(--warm);
}

.nav-btn.hidden {
  display: none;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 140px 20px 80px;
}
.recipe-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 36px;
}
.recipe-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform .25s ease, box-shadow .25s ease;
}
.recipe-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.15);
}
.recipe-image {
  width: 100%;
  height: 220px;
  background-size: cover;
  background-position: center;
}
.recipe-content {
  padding: 28px;
}
.recipe-content h2 {
  margin: 0 0 12px;
  font-size: 22px;
}
.recipe-content p {
  margin: 0;
  color: var(--muted);
  font-size: 15px;
}
.viewer {
  position: fixed;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  display: none;
  background: var(--bg);
  z-index: 900;
}
.viewer iframe {
  width: 100%;
  height: 100%;
  border: none;
}
footer {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  margin-top: 60px;
}
@media (max-width: 768px) {
  header { padding: 0 20px; }
  .brand { font-size: 34px; }
}
</style>
</head>

<body>

    <button id="homeBtn" class="nav-btn hidden">Ana Sayfa</button>
  </div>
</header>

<div class="container">
  <div id="listView" class="recipe-list"></div>
  <div id="viewer" class="viewer">
    <iframe id="recipeFrame"></iframe>
  </div>
  <footer>
    Ne yedik be • Tarif koleksiyonu

  { title: "Çıtır Halka Kalamar & Tarator Sos", desc: "Kısa kızartılmış kalamar ve klasik tarator.", path: "/Çıtır-Halka-Kalamar-ve-Tarator-Sos/", image: "./Çıtır-Halka-Kalamar-ve-Tarator-Sos/gorsel.jpg" },
  { title: "Wokta Ananaslı Sweet Chili Tavuk", desc: "Yüksek ısıda mühürlenmiş, tatlı-acı dengeli wok yemeği.", path: "/Wokta-Ananaslı-Sweet-Chili-Tavuk/", image: "./Wokta-Ananaslı-Sweet-Chili-Tavuk/gorsel.jpg" },

  { title: "Bağışıklık Destek Salatası", desc: "Grip döneminde vücudu yormadan, ferah ve dengeli beslenmek için asidite ve yağ oranı kontrollü bir salata.", path: "/Bağışıklık-Destek-Salatası/", image: "./Bağışıklık-Destek-Salatası/gorsel.jpg" },
  { title: "Un Helvası", desc: "Un, su, yağ, şeker başka malzeme istemeyen gariban tatlısı Un helvası, gece canınız tatlı isterse diye", path: "/Un-Helvası/", image: "./Un-Helvası/gorsel.jpg" },

  { title: "Kuzu Göbeği Mantarlı Tagliatelle", desc: "Muğla coğrafyasının nadide kuzu göbeği mantarı, krema ve Grana Padano'nun fındıksı aromasıyla buluşan üst segment bir makarna deneyimi.", path: "/Kuzu-Göbeği-Mantarlı-Tagliatelle/", image: "./Kuzu-Göbeği-Mantarlı-Tagliatelle/gorsel.jpg" },
  { title: "Kuzu Göbeği Mantarlı Yumurta", desc: "Ege mutfağının bahar müjdecisi kuzu göbeği mantarının, taze sarımsak ve sızma zeytinyağı ile buluştuğu, lezzet derinliği yüksek bir sabah klasiği.", path: "/Kuzu-Göbeği-Mantarlı-Yumurta/", image: "./Kuzu-Göbeği-Mantarlı-Yumurta/gorsel.jpg" }
];

const listView = document.getElementById("listView");
const viewer = document.getElementById("viewer");
const frame = document.getElementById("recipeFrame");
const homeBtn = document.getElementById("homeBtn");
const shareBtn = document.getElementById("shareBtn");

let currentRecipePath = "";

function renderList() {
  listView.innerHTML = "";
  recipes.forEach(r => {
    const card = document.createElement("div");
    card.className = "recipe-card";
    card.innerHTML = `
      <div class="recipe-image" style="background-image:url('${r.image}')"></div>
      <div class="recipe-content">
        <h2>${r.title}</h2>
        <p>${r.desc}</p>
      </div>
    `;
    card.onclick = () => openRecipe(r.path, true);
    listView.appendChild(card);
  });
}

function openRecipe(path, pushToHistory = true) {
  currentRecipePath = path;
  frame.src = "." + path + "index.html";
  listView.style.display = "none";
  viewer.style.display = "block";
  homeBtn.classList.remove("hidden");
  shareBtn.classList.remove("hidden");

  if (pushToHistory) {
    const slug = path.replace(/\//g, '');
    const newUrl = `${window.location.origin}${window.location.pathname}?shared=${slug}`;
    window.history.pushState({ path: path }, '', newUrl);
  }
}

function goHome(pushToHistory = true) {
  frame.src = "";
  viewer.style.display = "none";
  listView.style.display = "grid";
  homeBtn.classList.add("hidden");
  shareBtn.classList.add("hidden");

  if (pushToHistory) {
    const url = new URL(window.location);
    url.searchParams.delete('shared');
    window.history.pushState({}, '', url.pathname);
  }
}

function copyShareLink() {
  const slug = currentRecipePath.replace(/\//g, '');
  const shareUrl = `${window.location.origin}${window.location.pathname}?shared=${slug}`;
  
  navigator.clipboard.writeText(shareUrl).then(() => {
    const originalText = shareBtn.innerText;
    shareBtn.innerText = "Kopyalandı!";
    setTimeout(() => {
      shareBtn.innerText = originalText;
    }, 2000);
  });
}

// Tarayıcı geri tuşu kontrolü
window.addEventListener('popstate', (event) => {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedRecipe = urlParams.get('shared');
  
  if (sharedRecipe) {
    const recipe = recipes.find(r => r.path.includes(sharedRecipe));
    if (recipe) {
      openRecipe(recipe.path, false);
    } else {
      goHome(false);
    }
  } else {
    goHome(false);
  }
});

// Sayfa yüklendiğinde parametre kontrolü
window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedRecipe = urlParams.get('shared');
  
  if (sharedRecipe) {
    const recipe = recipes.find(r => r.path.includes(sharedRecipe));
    if (recipe) {
      openRecipe(recipe.path, false);
    }
  }
});

homeBtn.addEventListener("click", () => goHome(true));
shareBtn.addEventListener("click", copyShareLink);

renderList();
</script>
