<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Champions Battle Advisor</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111a33;
      --panel-2: #16213f;
      --panel-3: #1d2a4f;
      --text: #eef3ff;
      --muted: #95a3c7;
      --line: rgba(255,255,255,.08);
      --accent: #6ea8fe;
      --accent-2: #7ee2b8;
      --danger: #ff7c8a;
      --warn: #ffc766;
      --shadow: 0 18px 42px rgba(0,0,0,.35);
      --radius: 20px;
      --radius-sm: 14px;
      --gap: 14px;
      --card: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,.18), transparent 25%),
        radial-gradient(circle at top right, rgba(126,226,184,.15), transparent 22%),
        linear-gradient(180deg, #090d19, #0b1020 28%, #0a1121 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button, select, input[type="text"], input[type="search"] {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      outline: none;
      border-radius: 14px;
    }
    button { cursor: pointer; }
    button:hover { border-color: rgba(255,255,255,.18); }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      backdrop-filter: blur(14px);
      background: rgba(9,13,25,.72);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      display: flex; gap: 12px; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      max-width: 1600px; margin: 0 auto;
    }
    .brand { display: flex; flex-direction: column; gap: 3px; }
    .brand h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
    .brand small { color: var(--muted); }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .chip, .lang-btn, .nav-btn, .action-btn, .ghost-btn, .danger-btn {
      padding: 10px 14px;
      transition: .15s ease;
    }
    .lang-btn, .nav-btn { background: rgba(255,255,255,.04); }
    .nav-btn.active, .lang-btn.active { background: rgba(110,168,254,.18); border-color: rgba(110,168,254,.55); }
    .layout {
      display: grid;
      grid-template-columns: 260px minmax(0,1fr);
      gap: 14px;
      padding: 14px;
      max-width: 1600px; width: 100%; margin: 0 auto;
    }
    .sidebar, .content, .panel, .modal-card {
      background: rgba(17,26,51,.78);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }
    .sidebar {
      position: sticky; top: 76px; height: calc(100vh - 90px);
      padding: 14px; display: flex; flex-direction: column; gap: 12px;
    }
    .nav-list { display: flex; flex-direction: column; gap: 10px; }
    .nav-btn {
      width: 100%; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-btn span:last-child { color: var(--muted); font-size: 12px; }
    .sidebar-footer { margin-top: auto; display: grid; gap: 8px; }
    .hint {
      padding: 12px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,.03); color: var(--muted); font-size: 13px; line-height: 1.5;
      border: 1px solid var(--line);
    }
    .content { padding: 14px; min-height: calc(100vh - 116px); }
    .section { display: none; animation: fadeIn .16s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: .65; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }
    .section-head {
      display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .section-title { display: flex; flex-direction: column; gap: 4px; }
    .section-title h2 { margin: 0; font-size: 20px; }
    .section-title p { margin: 0; color: var(--muted); font-size: 13px; }
    .grid-2 { display: grid; grid-template-columns: 1.2fr .8fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
    .panel { padding: 12px; }
    .panel h3 { margin: 0 0 12px 0; font-size: 16px; }
    .filters, .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row { align-items: center; }
    .input, .select {
      min-height: 42px; padding: 10px 12px; flex: 1 1 180px;
    }
    .select { flex: 0 1 200px; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .action-btn { background: rgba(110,168,254,.18); border-color: rgba(110,168,254,.35); }
    .ghost-btn { background: rgba(255,255,255,.04); }
    .danger-btn { background: rgba(255,124,138,.14); border-color: rgba(255,124,138,.3); }
    .small { padding: 8px 10px; border-radius: 12px; font-size: 13px; }
    .scroll {
      max-height: 65vh; overflow: auto; padding-right: 4px;
      scrollbar-color: rgba(255,255,255,.18) transparent;
    }
    .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
    .pokemon-card, .team-card, .battle-card, .summary-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
    }
    .pokemon-card { cursor: pointer; }
    .pokemon-card.selected { border-color: rgba(126,226,184,.65); box-shadow: 0 0 0 1px rgba(126,226,184,.22) inset; }
    .pokemon-card.out { opacity: .45; filter: grayscale(.25); }
    .pokemon-img-wrap {
      height: 132px; display: grid; place-items: center; background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--line);
    }
    .pokemon-img { width: 112px; height: 112px; object-fit: contain; image-rendering: auto; }
    .pokemon-meta { padding: 10px; display: grid; gap: 7px; }
    .pokemon-name { display: flex; justify-content: space-between; gap: 10px; font-weight: 700; }
    .pokemon-sub { color: var(--muted); font-size: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; padding: 5px 8px; border-radius: 999px; background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
    }
    .type-tag { background: rgba(110,168,254,.12); }
    .region-tag { background: rgba(126,226,184,.10); }
    .empty-state {
      padding: 24px; text-align: center; color: var(--muted);
      border: 1px dashed rgba(255,255,255,.15); border-radius: 18px;
      background: rgba(255,255,255,.02);
    }
    .list { display: grid; gap: 10px; }
    .line-item {
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
      padding: 10px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.03);
    }
    .line-item .left { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .avatar {
      width: 52px; height: 52px; border-radius: 14px; object-fit: contain; background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
    }
    .line-title { font-weight: 700; }
    .line-sub { color: var(--muted); font-size: 12px; }
    .badge {
      padding: 4px 8px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line);
      background: rgba(255,255,255,.04); color: var(--muted);
    }
    .team-card { padding: 12px; display: grid; gap: 10px; }
    .team-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .team-head h4 { margin: 0; }
    .team-members { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 8px; }
    .mini-poke {
      position: relative; aspect-ratio: 1; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--line); background: rgba(255,255,255,.03);
      display: grid; place-items: center; cursor: pointer;
    }
    .mini-poke img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .mini-poke.empty { border-style: dashed; color: var(--muted); font-size: 12px; }
    .mini-x {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 999px;
      display: grid; place-items: center; background: rgba(255,124,138,.85); color: white; border: 0;
      font-size: 12px;
    }
    .battle-shell { display: grid; gap: 12px; }
    .battle-top { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .battle-choices { display: grid; gap: 10px; }
    .pair { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .battle-slot {
      padding: 10px; border-radius: 16px; border: 1px solid var(--line); background: rgba(255,255,255,.03);
      display: flex; gap: 10px; align-items: center; justify-content: space-between;
    }
    .battle-slot .meta { min-width: 0; }
    .battle-field {
      display: grid; gap: 12px; grid-template-columns: 1fr 1fr;
    }
    .suggestion {
      display: grid; gap: 8px;
      padding: 12px; border-radius: 18px; border: 1px solid rgba(126,226,184,.25);
      background: linear-gradient(180deg, rgba(126,226,184,.10), rgba(255,255,255,.03));
    }
    .suggestion h4 { margin: 0; }
    .progress-wrap {
      padding: 10px; border-radius: 14px; background: rgba(255,255,255,.04); border: 1px solid var(--line);
      display: grid; gap: 8px;
    }
    .progress-bar {
      height: 10px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden;
    }
    .progress-bar > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .15s ease; }
    .muted { color: var(--muted); }
    .loading-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(circle at top, rgba(110,168,254,.12), rgba(9,13,25,.95) 55%, rgba(9,13,25,.98));
      display: grid; place-items: center; padding: 18px;
    }
    .loading-card {
      width: min(620px, 100%); padding: 18px; border-radius: 24px; border: 1px solid var(--line);
      background: rgba(17,26,51,.85); box-shadow: var(--shadow); display: grid; gap: 14px;
    }
    .loading-card h2 { margin: 0; }
    .loading-card p { margin: 0; color: var(--muted); line-height: 1.5; }
    .toast-wrap { position: fixed; right: 14px; bottom: 14px; z-index: 120; display: grid; gap: 10px; }
    .toast {
      min-width: 240px; max-width: 360px; padding: 12px 14px; border-radius: 16px; border: 1px solid var(--line);
      background: rgba(17,26,51,.95); box-shadow: var(--shadow);
    }
    .toast strong { display: block; margin-bottom: 4px; }
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,.58); display: none; align-items: center; justify-content: center; padding: 18px;
    }
    .modal-backdrop.show { display: flex; }
    .modal-card { width: min(560px, 100%); padding: 16px; }
    .modal-card h3 { margin: 0 0 8px 0; }
    .modal-card p { margin: 0 0 14px 0; color: var(--muted); line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
    .split { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .pill-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.03); }
    .pill-toggle button { border: 0; border-radius: 0; padding: 10px 14px; background: transparent; }
    .pill-toggle button.active { background: rgba(110,168,254,.18); }
    .sep { height: 1px; background: var(--line); margin: 12px 0; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; height: auto; }
      .grid-2, .battle-top, .battle-field { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; align-items: stretch; }
      .toolbar { justify-content: stretch; }
      .toolbar > * { flex: 1 1 auto; }
      .team-members { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .pokemon-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); }
      .content { padding: 12px; }
      .sidebar { padding: 12px; }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Pokemon Champions Battle Advisor</h1>
        <small id="subtitle">Collection, teams and battle guidance</small>
      </div>
      <div class="toolbar">
        <div class="pill-toggle" id="langSwitch">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="tr">TR</button>
        </div>
        <button class="ghost-btn small" id="btnRefresh">Sync cache</button>
        <button class="ghost-btn small" id="btnClearUser">Clear user data</button>
        <button class="danger-btn small" id="btnClearAll">Clear all cache</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="nav-list" id="navList">
        <button class="nav-btn active" data-section="box"><span id="navBox">BOX</span><span>1</span></button>
        <button class="nav-btn" data-section="teams"><span id="navTeams">TEAMS</span><span>2</span></button>
        <button class="nav-btn" data-section="battle"><span id="navBattle">BATTLE</span><span>3</span></button>
      </div>
      <div class="hint" id="sidebarHint"></div>
      <div class="sidebar-footer">
        <div class="progress-wrap">
          <div class="row" style="justify-content:space-between;">
            <strong id="cacheLabel">Cache</strong>
            <span class="badge" id="cacheMeta">0%</span>
          </div>
          <div class="progress-bar"><div id="cacheBar"></div></div>
          <div class="muted" id="cacheDetail">Waiting for sync...</div>
        </div>
      </div>
    </aside>

    <main class="content">
      <section class="section active" id="section-box"></section>
      <section class="section" id="section-teams"></section>
      <section class="section" id="section-battle"></section>
    </main>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <h2 id="loadingTitle">Loading Pokémon data</h2>
    <p id="loadingText">First run pulls the full PokéAPI catalog, stores it locally, and then reuses the cache later.</p>
    <div class="progress-wrap">
      <div class="row" style="justify-content:space-between;">
        <strong id="loadingCount">0 / 0</strong>
        <span class="badge" id="loadingPct">0%</span>
      </div>
      <div class="progress-bar"><div id="loadingBar"></div></div>
      <div class="muted" id="loadingStatus">Preparing...</div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="confirmModal">
  <div class="modal-card">
    <h3 id="confirmTitle"></h3>
    <p id="confirmText"></p>
    <div class="modal-actions">
      <button class="ghost-btn" id="confirmCancel">Cancel</button>
      <button class="danger-btn" id="confirmOk">Confirm</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

  function safeParse(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} ${url}`);
    return res.json();
  }

  async function mapLimit(items, limit, mapper, onProgress) {
    const results = new Array(items.length);
    let idx = 0, done = 0;
    async function worker() {
      while (idx < items.length) {
        const current = idx++;
        results[current] = await mapper(items[current], current);
        done++;
        onProgress && onProgress(done, items.length, items[current], current);
      }
    }
    const workers = Array.from({ length: Math.min(limit, items.length) }, worker);
    await Promise.all(workers);
    return results;
  }

  async function syncCatalog(force = false) {
    const meta = loadMeta();
    const cached = !force ? loadCatalog() : null;
    if (cached && meta && meta.version === CACHE_VERSION && Array.isArray(cached.pokemon) && cached.pokemon.length) {
      state.catalog = cached;
      state.loadingTotal = cached.pokemon.length;
      state.loadingCount = cached.pokemon.length;
      writeProgress(cached.pokemon.length, cached.pokemon.length, tr('cacheReady'));
      setLoading(false);
      renderAll();
      return;
    }

    setLoading(true);
    writeProgress(0, 1, tr('waiting'));
    const base = 'https://pokeapi.co/api/v2';
    const [pokemonList, typesList, generationsList] = await Promise.all([
      fetchJson(`${base}/pokemon?limit=2000&offset=0`),
      fetchJson(`${base}/type?limit=100&offset=0`),
      fetchJson(`${base}/generation?limit=20&offset=0`)
    ]);

    const typeResults = typesList.results.filter(x => !['unknown', 'shadow'].includes(x.name));
    const generationResults = generationsList.results;

    const generations = await mapLimit(generationResults, 3, async (g) => {
      const detail = await fetchJson(g.url);
      return {
        name: detail.name,
        region: detail.main_region ? detail.main_region.name : 'unknown'
      };
    }, (done, total) => writeProgress(done, total + pokemonList.results.length + typeResults.length, `Loading generations ${done}/${total}`));

    const typeChart = await mapLimit(typeResults, 4, async (t) => {
      const detail = await fetchJson(t.url);
      const rel = detail.damage_relations || {};
      return {
        name: detail.name,
        damage: {
          double_to: (rel.double_damage_to || []).map(x => x.name),
          half_to: (rel.half_damage_to || []).map(x => x.name),
          no_to: (rel.no_damage_to || []).map(x => x.name),
          double_from: (rel.double_damage_from || []).map(x => x.name),
          half_from: (rel.half_damage_from || []).map(x => x.name),
          no_from: (rel.no_damage_from || []).map(x => x.name)
        }
      };
    }, (done, total) => writeProgress(generations.length + done, total + generations.length + pokemonList.results.length, `Loading types ${done}/${total}`));

    const genMap = Object.fromEntries(generations.map(g => [g.name, g.region]));
    const totalPokemon = pokemonList.results.length;

    const pokemon = await mapLimit(pokemonList.results, 12, async (p, index) => {
      const detail = await fetchJson(p.url);
      const species = await fetchJson(detail.species.url);
      const image = detail.sprites?.other?.['official-artwork']?.front_default || detail.sprites?.front_default || '';
      const types = (detail.types || []).sort((a,b) => a.slot - b.slot).map(x => x.type.name);
      const stats = Object.fromEntries((detail.stats || []).map(s => [s.stat.name, s.base_stat]));
      const gen = species.generation?.name || 'unknown';
      const reg = genMap[gen] || 'unknown';
      return {
        id: detail.id,
        name: detail.name,
        displayName: titleCase(detail.name),
        image,
        types,
        stats: {
          hp: stats.hp || 0,
          attack: stats.attack || 0,
          defense: stats.defense || 0,
          special-attack: stats['special-attack'] || 0,
          special-defense: stats['special-defense'] || 0,
          speed: stats.speed || 0
        },
        generation: gen,
        region: reg,
        height: detail.height,
        weight: detail.weight,
        order: detail.order,
        speciesId: species.id,
        speciesName: species.name
      };
    }, (done, total) => {
      const count = generations.length + typeResults.length + done;
      writeProgress(count, generations.length + typeResults.length + totalPokemon, `Loading Pokémon ${done}/${total}`);
      /* no partial save */
    });

    state.catalog = {
      pokemon: pokemon.sort((a, b) => a.id - b.id),
      generations: generations.sort((a, b) => a.name.localeCompare(b.name)),
      regions: [...new Set(generations.map(g => g.region))].sort(),
      typeChart
    };
    saveCatalog(state.catalog);
    writeProgress(pokemon.length + generations.length + typeResults.length, pokemon.length + generations.length + typeResults.length, tr('cacheReady'));
    setLoading(false);
    renderAll();
    showToast(tr('cacheReady'), `${pokemon.length} Pokémon`);
  }

  function getPokemonById(id) {
    return state.catalog?.pokemon.find(p => String(p.id) === String(id));

  function getTypeRecord(name) { return state.catalog?.typeChart.find(t => t.name === name); }

  function attackMultiplier(attackerTypes, defenderTypes) {
    if (!attackerTypes.length || !defenderTypes.length) return 1;
    let mult = 1;
    for (const atk of attackerTypes) {
      const row = getTypeRecord(atk);
      if (!row) continue;
      for (const def of defenderTypes) {
        if (row.damage.no_to.includes(def)) mult *= 0;
        else if (row.damage.double_to.includes(def)) mult *= 2;
        else if (row.damage.half_to.includes(def)) mult *= 0.5;
      }
    }
    return mult;
  }

  function incomingMultiplier(defenderTypes, attackerTypes) {
    return attackMultiplier(attackerTypes, defenderTypes);
  }

  function statTotal(p) {
    if (!p) return 0;
    const s = p.stats || {};
    return (s.hp||0)+(s.attack||0)+(s.defense||0)+(s['special-attack']||0)+(s['special-defense']||0)+(s.speed||0);
  }

  function candidateScore(p, enemyTeam, pool = []) {
    const enemies = enemyTeam.length ? enemyTeam : [];
    const offense = enemies.length ? enemies.reduce((sum, e) => sum + attackMultiplier(p.types, e.types), 0) / enemies.length : 0;
    const defense = enemies.length ? enemies.reduce((sum, e) => sum + incomingMultiplier(p.types, e.types), 0) / enemies.length : 0;
    const spread = new Set(p.types).size;
    const speed = (p.stats.speed || 0) / 100;
    const total = statTotal(p) / 600;
    const antiDup = pool.filter(x => x && x.id !== p.id).some(x => JSON.stringify(x.types) === JSON.stringify(p.types)) ? -0.35 : 0;
    return (offense * 1.5) + ((2.2 - defense) * 1.25) + (spread * 0.12) + speed + total + antiDup;
  }

  function recommendTeamFromPool(pool, enemyTeam, size) {
    const remaining = pool.slice();
    const chosen = [];
    while (chosen.length < size && remaining.length) {
      remaining.sort((a, b) => candidateScore(b, enemyTeam, chosen) - candidateScore(a, enemyTeam, chosen));
      const next = remaining.shift();
      if (!next) break;
      chosen.push(next);
      for (let i = remaining.length - 1; i >= 0; i--) {
        const dupTypes = overlapScore(remaining[i].types, next.types);
        if (dupTypes > 1 && remaining.length > size) remaining.splice(i, 1);
      }
    }
    return chosen.slice(0, size);
  }

  function overlapScore(a = [], b = []) { return a.filter(x => b.includes(x)).length; }

  function recommendAgainst(currentOwn, currentEnemy, battleMode) {
    const pool = currentOwn.filter(p => p && !state.battle.outOwn.includes(p.id));
    if (!pool.length || !currentEnemy.length) return [];
    if (battleMode === 'double') {
      const pairs = [];
      for (let i = 0; i < pool.length; i++) {
        for (let j = i + 1; j < pool.length; j++) {
          const a = pool[i], b = pool[j];
          const pairOffense = currentEnemy.reduce((sum, e) => sum + Math.max(attackMultiplier(a.types, e.types), attackMultiplier(b.types, e.types)), 0) / currentEnemy.length;
          const pairDefense = currentEnemy.reduce((sum, e) => sum + Math.min(incomingMultiplier(a.types, e.types), incomingMultiplier(b.types, e.types)), 0) / currentEnemy.length;
          const synergy = 0.2 * (4 - overlapScore(a.types, b.types));
          pairs.push({ ids: [a.id, b.id], score: pairOffense * 1.35 + (2.1 - pairDefense) * 1.2 + synergy, names: [a.displayName, b.displayName] });
        }
      }
      pairs.sort((x, y) => y.score - x.score);
      return pairs.slice(0, 3);
    }
    return pool
      .map(p => ({ id: p.id, score: candidateScore(p, currentEnemy, pool), name: p.displayName }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3);
  }

  function filteredPokemon(filterState) {
    if (!state.catalog) return [];
    const q = (filterState.search || '').trim().toLowerCase();
    return state.catalog.pokemon.filter(p => {

      const matchesGen = !filterState.gen || filterState.gen === 'all' || p.generation === filterState.gen;
      return matchesSearch && matchesType && matchesRegion && matchesGen;
    });
  }

  function buildAdviceCards(chosen, activeEnemy, mode) {
    if (!chosen.length) return `<div class="empty-state">${tr('noData')}</div>`;
    const pool = chosen.filter(p => !state.battle.outOwn.includes(p.id));
    if (!pool.length) return `<div class="empty-state">${tr('noData')}</div>`;
    const enemy = activeEnemy.length ? activeEnemy : [];
    const rec = recommendAgainst(pool, enemy.length ? enemy : chosen.slice(0, mode === 'double' ? 2 : 1), mode);
    const cards = [];
    if (mode === 'double') {
      const top = rec[0] || { ids: [], score: 0, names: [] };
      const pairPokes = top.ids.map(id => getPokemonById(id)).filter(Boolean);
      cards.push(adviceCard(tr('bestLead'), pairPokes, top.score));
      cards.push(adviceCard(tr('bestSwitch'), pairPokes, top.score));
      cards.push(summaryCard(chosen, activeEnemy, mode));
    } else {
      const top = rec[0] || { id: null, score: 0 };
      const p = getPokemonById(top.id);
      cards.push(adviceCard(tr('bestLead'), p ? [p] : [], top.score));
      cards.push(adviceCard(tr('bestSwitch'), p ? [p] : [], top.score));
      cards.push(summaryCard(chosen, activeEnemy, mode));
    }
    return cards.join('');
  }

  function adviceCard(label, pokes, score) {
    const items = pokes.filter(Boolean);
    const body = items.length ? items.map(p => `
      <div class="battle-slot" style="margin-top:8px;">
        <div class="left">
          <img class="avatar" src="${escapeHtml(p.image || '')}" alt="${escapeHtml(p.displayName)}">
          <div class="meta">
            <div class="line-title">${escapeHtml(p.displayName)}</div>
            <div class="line-sub">${escapeHtml(p.types.map(titleCase).join(' / '))}</div>
          </div>
        </div>
      </div>`).join('') : `<div class="muted">${tr('noData')}</div>`;
    return `<div class="suggestion"><h4>${escapeHtml(label)}</h4><div class="badge">${score ? score.toFixed(2) : '0.00'}</div>${body}</div>`;
  }

  function summaryCard(chosen, activeEnemy, mode) {
    const enemies = activeEnemy.length ? activeEnemy : [];
    const scores = chosen.map(p => {
      const vs = enemies.length ? enemies.reduce((sum, e) => sum + attackMultiplier(p.types, e.types), 0) / enemies.length : 0;
      const taken = enemies.length ? enemies.reduce((sum, e) => sum + incomingMultiplier(p.types, e.types), 0) / enemies.length : 0;
      return { p, vs, taken };
    }).sort((a, b) => (b.vs - a.vs) + (a.taken - b.taken));
    const top = scores[0];
    return `<div class="suggestion"><h4>${tr('summary')}</h4>
      <div class="muted">${mode === 'double' ? tr('double') : tr('single')}</div>
      <div class="sep"></div>
      ${top ? `<div class="battle-slot">
        <div class="left">
          <img class="avatar" src="${escapeHtml(top.p.image || '')}" alt="${escapeHtml(top.p.displayName)}">
          <div class="meta">
            <div class="line-title">${escapeHtml(top.p.displayName)}</div>
            <div class="line-sub">${escapeHtml(top.p.types.map(titleCase).join(' / '))}</div>
          </div>
        </div>
        <span class="badge">${top.vs.toFixed(2)} / ${top.taken.toFixed(2)}</span>
      </div>` : `<div class="muted">${tr('noData')}</div>`}
    </div>`;
  }

    if (state.loading || !state.catalog) {
      $('loadingOverlay').style.display = 'grid';
      return;
    }
    $('loadingOverlay').style.display = 'none';
  }

  function setTab(tab) {
    state.tab = tab;
    [...document.querySelectorAll('.section')].forEach(sec => sec.classList.toggle('active', sec.id === `section-${tab}`));
    [...document.querySelectorAll('.nav-btn')].forEach(btn => btn.classList.toggle('active', btn.dataset.section === tab));
    renderAll();
  }

  function addToBox(id) {
    id = Number(id);
    if (!state.user.box.includes(id)) state.user.box.push(id);
    saveState();
    renderAll();
    showToast(tr('boxSaved'));
  }
  function removeFromBox(id) {
    id = Number(id);
    state.user.box = state.user.box.filter(x => x !== id);
    state.user.teams = state.user.teams.map(t => ({ ...t, memberIds: t.memberIds.filter(x => x !== id) }));
    state.teamDraft = state.teamDraft.filter(x => x !== id);
    if (state.battle.ownTeamId && getTeamById(state.battle.ownTeamId)) {
      const team = getTeamById(state.battle.ownTeamId);
      state.battle.selectedOwnIds = state.battle.selectedOwnIds.filter(x => team.memberIds.includes(x));
    }
    saveState();
    renderAll();
    showToast(tr('boxSaved'));
  }

  function toggleDraft(id) {
    id = Number(id);
    if (!state.user.box.includes(id)) return showToast('Add Pokémon to box first');
    if (state.teamDraft.includes(id)) state.teamDraft = state.teamDraft.filter(x => x !== id);
    else if (state.teamDraft.length < 6) state.teamDraft.push(id);
    saveState();
    renderSectionTeams();
  }

  function generateAutoTeam() {
    const pool = getBoxPokemons();
    if (!pool.length) return showToast(tr('noPokemon'));
    const picked = recommendTeamFromPool(pool, [], 6);
    state.teamDraft = picked.map(p => p.id);
    state.teamName = `T${state.user.teams.length + 1}`;
    saveState();
    renderSectionTeams();
    showToast(tr('autoGenerated'));
  }

  function saveTeam() {
    const members = state.teamDraft.map(getPokemonById).filter(Boolean);
    if (members.length !== 6) return;
    const name = state.teamName.trim() || `T${state.user.teams.length + 1}`;
    state.user.teams.push({ id: nowId(), name, memberIds: state.teamDraft.slice(0, 6) });
    state.teamDraft = [];
    state.teamName = '';
    saveState();
    renderAll();
    showToast(tr('teamSaved'));
  }

  function deleteTeam(id) {
    state.user.teams = state.user.teams.filter(t => String(t.id) !== String(id));
    if (String(state.battle.ownTeamId) === String(id)) {
      state.battle.ownTeamId = '';
      state.battle.locked = false;
      state.battle.selectedOwnIds = [];
      state.battle.activeOwn = [];
    }
    saveState();
    renderAll();
    showToast(tr('teamDeleted'));
  }

  function autoOpponent() {
    const list = filteredPokemon({ search: state.battle.opponentSearch, type: state.battle.opponentType, region: state.battle.opponentRegion, gen: state.battle.opponentGen });
    if (!list.length) return;
    const draft = recommendTeamFromPool(list, [], 6);
    state.battle.opponentDraft = draft.map(p => p.id);
    state.battle.locked = false;
    state.battle.selectedEnemyIds = [];
    state.battle.activeEnemy = [];
    state.battle.outEnemy = [];
    saveState();
    renderSectionBattle();
  }

  function toggleBattleChoice(id) {
    id = Number(id);
    if (state.battle.locked) return;
    if (state.battle.opponentDraft.includes(id)) state.battle.opponentDraft = state.battle.opponentDraft.filter(x => x !== id);
    else if (state.battle.opponentDraft.length < 6) state.battle.opponentDraft.push(id);
    state.battle.selectedEnemyIds = state.battle.opponentDraft.slice();
    saveState();
    renderSectionBattle();
  }

  function lockBattle() {
    if (!state.battle.ownTeamId || state.battle.opponentDraft.length !== 6) return;
    const team = getTeamById(state.battle.ownTeamId);
    if (!team) return;
    const ownMembers = team.memberIds.map(getPokemonById).filter(Boolean);
    const enemy = state.battle.opponentDraft.map(getPokemonById).filter(Boolean);
    const size = state.battle.mode === 'single' ? 3 : 4;
    const rec = recommendTeamFromPool(ownMembers, enemy, Math.min(size, ownMembers.length));
    state.battle.locked = true;
    state.battle.selectedOwnIds = rec.map(p => p.id);
    state.battle.selectedEnemyIds = enemy.map(p => p.id);
    state.battle.activeOwn = rec.slice(0, state.battle.mode === 'double' ? 2 : 1).map(p => p.id);
    state.battle.activeEnemy = enemy.slice(0, state.battle.mode === 'double' ? 2 : 1).map(p => p.id);
    state.battle.outOwn = [];
    state.battle.outEnemy = [];
    saveState();
    renderSectionBattle();
    showToast(tr('battleLocked'));
  }

  function toggleOut(which, id) {
    const key = which === 'own' ? 'outOwn' : 'outEnemy';
    const arr = state.battle[key];
    id = Number(id);
    if (arr.includes(id)) state.battle[key] = arr.filter(x => x !== id);
    else state.battle[key].push(id);
    saveState();
    renderSectionBattle();
  }

  function setActive(which, slot, id) {
    id = Number(id);
    if (which === 'own') state.battle.activeOwn[slot] = id;
    else state.battle.activeEnemy[slot] = id;
    saveState();
    renderSectionBattle();
  }

  function exportData() {
    const payload = { state: state.user, savedAt: new Date().toISOString(), version: CACHE_VERSION };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pokemon-champions-battle-advisor-backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function importData(file) {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data && data.state) {
      state.user = data.state;
      saveState();
      renderAll();
      showToast('Imported');
    }
  }

    openConfirm({
      title: tr('clearUser'),
      text: tr('clearUserConfirm'),
      okText: tr('yes'),
      onConfirm: () => {
        state.user = { box: [], teams: [] };
        state.teamDraft = [];
        state.teamName = '';
        state.battle = {
          mode: 'single', ownTeamId: '', opponentSearch: '', opponentType: 'all', opponentRegion: 'all', opponentGen: 'all',
          opponentDraft: [], locked: false, selectedOwnIds: [], selectedEnemyIds: [], activeOwn: [], activeEnemy: [], outOwn: [], outEnemy: []
        };
        saveState();
        renderAll();
        showToast(tr('userWiped'));
      }
    });
  }

  function clearAllData() {
    openConfirm({
      title: tr('clearAll'),
      text: tr('clearAllConfirm'),
      okText: tr('yes'),
      onConfirm: () => {
        localStorage.removeItem(LS_STATE);
        localStorage.removeItem(LS_CATALOG);
        localStorage.removeItem(LS_META);
        state.user = { box: [], teams: [] };
        state.catalog = null;
        state.teamDraft = [];
        state.teamName = '';
        state.battle = {
          mode: 'single', ownTeamId: '', opponentSearch: '', opponentType: 'all', opponentRegion: 'all', opponentGen: 'all',
          opponentDraft: [], locked: false, selectedOwnIds: [], selectedEnemyIds: [], activeOwn: [], activeEnemy: [], outOwn: [], outEnemy: []
        };
        renderAll();
        syncCatalog(true).then(() => showToast(tr('cacheWiped')));
      }
    });
  }

  function bindStaticEvents() {
    $('navList').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-section]');
      if (btn) setTab(btn.dataset.section);
    });
    $('langSwitch').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-lang]');
      if (!btn) return;
      state.lang = btn.dataset.lang;
      state.user.lang = state.lang;
      saveState();
      renderAll();
    });
    $('btnRefresh').addEventListener('click', () => syncCatalog(true));
    $('btnClearUser').addEventListener('click', clearUserData);
    $('btnClearAll').addEventListener('click', clearAllData);
    $('confirmCancel').addEventListener('click', () => $('confirmModal').classList.remove('show'));
    $('confirmModal').addEventListener('click', (e) => { if (e.target === $('confirmModal')) $('confirmModal').classList.remove('show'); });
  }

  function bindDynamicEvents() {
    const boxSearch = $('boxSearch');
    if (boxSearch) boxSearch.oninput = (e) => { state.boxSearch = e.target.value; renderSectionBox(); };
    const boxRegion = $('boxRegion');
    if (boxRegion) boxRegion.onchange = (e) => { state.boxRegion = e.target.value; renderSectionBox(); };
    const boxGen = $('boxGen');
    if (boxGen) boxGen.onchange = (e) => { state.boxGen = e.target.value; renderSectionBox(); };
    const boxType = $('boxType');
    if (boxType) boxType.onchange = (e) => { state.boxType = e.target.value; renderSectionBox(); };

    const teamName = $('teamNameInput');
    if (teamName) teamName.oninput = (e) => { state.teamName = e.target.value; };
    const teamBoxSearch = $('teamBoxSearch');
    if (teamBoxSearch) teamBoxSearch.oninput = (e) => { state.boxSearch = e.target.value; renderSectionTeams(); };
    const teamBoxType = $('teamBoxType');
    if (teamBoxType) teamBoxType.onchange = (e) => { state.teamBoxType = e.target.value; renderSectionTeams(); };

    const battleOwn = $('battleOwnTeam');
    if (battleOwn) battleOwn.onchange = (e) => { state.battle.ownTeamId = e.target.value; state.battle.locked = false; saveState(); renderSectionBattle(); };
    const battleSearch = $('battleSearch');
    if (battleSearch) battleSearch.oninput = (e) => { state.battle.opponentSearch = e.target.value; renderSectionBattle(); };
    const battleRegion = $('battleRegion');
    if (battleRegion) battleRegion.onchange = (e) => { state.battle.opponentRegion = e.target.value; renderSectionBattle(); };
    const battleGen = $('battleGen');
    if (battleGen) battleGen.onchange = (e) => { state.battle.opponentGen = e.target.value; renderSectionBattle(); };
    const battleType = $('battleType');
    if (battleType) battleType.onchange = (e) => { state.battle.opponentType = e.target.value; renderSectionBattle(); };

    const modeToggle = $('battleModeToggle');
    if (modeToggle) modeToggle.onclick = (e) => {
      const btn = e.target.closest('[data-mode]');
      if (!btn) return;
      state.battle.mode = btn.dataset.mode;
      state.battle.locked = false;
      state.battle.selectedOwnIds = [];
      state.battle.activeOwn = [];
      state.battle.activeEnemy = [];
      saveState();
      renderSectionBattle();
    };

    const btnAutoTeam = $('btnAutoTeam');
    if (btnAutoTeam) btnAutoTeam.onclick = generateAutoTeam;
    const btnSaveTeam = $('btnSaveTeam');
    if (btnSaveTeam) btnSaveTeam.onclick = saveTeam;
    const btnResetTeam = $('btnResetTeam');
    if (btnResetTeam) btnResetTeam.onclick = () => { state.teamDraft = []; state.teamName = ''; saveState(); renderSectionTeams(); };
    const btnAutoOpp = $('btnAutoOpp');
    if (btnAutoOpp) btnAutoOpp.onclick = autoOpponent;
    const btnLock = $('btnLockBattle');
    if (btnLock) btnLock.onclick = () => state.battle.locked ? unlockBattle() : lockBattle();
    const btnClearUserQuick = $('btnClearUserQuick');
    if (btnClearUserQuick) btnClearUserQuick.onclick = clearUserData;
    const btnExport = $('btnExport');
    if (btnExport) btnExport.onclick = exportData;
    const btnImport = $('btnImport');
    if (btnImport) btnImport.onclick = () => $('importFile').click();
    const importFile = $('importFile');
    if (importFile) importFile.onchange = async (e) => { const file = e.target.files && e.target.files[0]; if (file) await importData(file); };

    document.body.onclick = (e) => {
      const card = e.target.closest('.pokemon-card');
      if (card) {
        const id = Number(card.dataset.id);
        if (state.tab === 'box') {
          if (isInBox(id)) removeFromBox(id); else addToBox(id);
        } else if (state.tab === 'teams') {
          toggleDraft(id);
        } else if (state.tab === 'battle') {
          toggleBattleChoice(id);
        }
        return;
      }
      const removeBoxBtn = e.target.closest('[data-remove-box]');
      if (removeBoxBtn) return removeFromBox(removeBoxBtn.dataset.removeBox);
      const deleteTeamBtn = e.target.closest('[data-delete-team]');
      if (deleteTeamBtn) return deleteTeam(deleteTeamBtn.dataset.deleteTeam);
      const removeDraftBtn = e.target.closest('[data-remove-draft]');
      if (removeDraftBtn) {
        const idx = Number(removeDraftBtn.dataset.removeDraft);
        state.teamDraft.splice(idx, 1);
        saveState();
        renderSectionTeams();
        return;
      }
      const toggleOutOwn = e.target.closest('[data-toggle-out-own]');
      if (toggleOutOwn) return toggleOut('own', toggleOutOwn.dataset.toggleOutOwn);
      const toggleOutEnemy = e.target.closest('[data-toggle-out-enemy]');
      if (toggleOutEnemy) return toggleOut('enemy', toggleOutEnemy.dataset.toggleOutEnemy);
      const setOwnSlot = e.target.closest('[data-set-own-slot]');
      if (setOwnSlot) {
        const slot = Number(setOwnSlot.dataset.setOwnSlot);
        const options = (state.battle.selectedOwnIds.length ? state.battle.selectedOwnIds : (getTeamById(state.battle.ownTeamId)?.memberIds || [])).map(getPokemonById).filter(Boolean);
        const choice = options.find(p => !state.battle.outOwn.includes(p.id)) || options[0];
        if (choice) setActive('own', slot, choice.id);
        return;
      }
      const setEnemySlot = e.target.closest('[data-set-enemy-slot]');
      if (setEnemySlot) {
        const slot = Number(setEnemySlot.dataset.setEnemySlot);
        const options = state.battle.opponentDraft.map(getPokemonById).filter(Boolean);
        const choice = options.find(p => !state.battle.outEnemy.includes(p.id)) || options[0];
        if (choice) setActive('enemy', slot, choice.id);
        return;
      }
      const ownFieldSlot = e.target.closest('[data-own-field-slot]');
      if (ownFieldSlot) {
        const slot = Number(ownFieldSlot.dataset.ownFieldSlot);
        const choice = (state.battle.selectedOwnIds.map(getPokemonById).filter(Boolean))[slot] || null;
        if (choice) setActive('own', slot, choice.id);
        return;
      }
      const battleCard = e.target.closest('[data-toggle-own-active]');
      if (battleCard) {
        const id = Number(battleCard.dataset.toggleOwnActive);
        const selected = state.battle.selectedOwnIds.slice();
        if (!selected.includes(id)) return;
        const idx = selected.indexOf(id);
        const slot = state.battle.mode === 'double' ? Math.min(1, Math.max(0, idx)) : 0;
        setActive('own', slot, id);
      }
    };
  }

  function unlockBattle() {
    state.battle.locked = false;
    state.battle.selectedOwnIds = [];
    state.battle.selectedEnemyIds = [];
    state.battle.activeOwn = [];
    state.battle.activeEnemy = [];
    saveState();
    renderSectionBattle();
  }

  async function init() {
    state.user = loadState();
    state.lang = state.user.lang || 'en';
    renderTopbar();
    bindStaticEvents();
    renderAll();
    bindDynamicEvents();
    if (loadCatalog() && loadMeta()?.version === CACHE_VERSION) {
      state.catalog = loadCatalog();
      setLoading(false);
      renderAll();
    } else {
      await syncCatalog(false);
    }
    state.user.lang = state.lang;
    saveState();
    renderAll();
    setInterval(() => { if (!state.loading && state.catalog) renderSidebar(); }, 30000);
  }

  window.addEventListener('hashchange', () => {
    const hash = location.hash.replace('#', '');
    if (['box','teams','battle'].includes(hash)) setTab(hash);
  });

  init().catch(err => {
    console.error(err);
    setLoading(false);
    $('loadingStatus').textContent = err.message || 'Error';
    showToast('Error', err.message || 'Unknown error');
  });
})();
</
