<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Champions Battle Advisor</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161d2f; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        nav { background: var(--card); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .tabs { display: flex; background: #000; padding: 4px; gap: 4px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #242f45; color: #94a3b8; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        .tab-btn.active { background: var(--accent); color: var(--bg); }

        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #2d3748; }
        
        .poke-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; width: 100%; box-sizing: border-box; }
        .poke-item { background: #1f2937; border-radius: 8px; padding: 8px; text-align: center; border: 2px solid transparent; cursor: pointer; position: relative; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .poke-item img { width: 64px; height: 64px; object-fit: contain; }
        .poke-item .name { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .filter-row input, .filter-row select { flex: 1; min-width: 120px; background: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; }
        
        .battle-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .battle-slot { border: 2px solid #334155; border-radius: 10px; padding: 10px; background: #0003; min-height: 200px; }
        .active-sel { border-color: var(--green) !important; background: rgba(16, 185, 129, 0.1); }
        .enemy-sel { border-color: var(--red) !important; background: rgba(239, 68, 68, 0.1); }
        .faint { filter: grayscale(1) brightness(0.4); pointer-events: none; }
        .faint::before { content: 'DEAD'; position: absolute; top: 40%; color: var(--red); font-weight: 900; z-index: 10; border: 2px solid var(--red); padding: 2px 4px; border-radius: 4px; transform: rotate(-15deg); }

        .advisor-bar { background: var(--accent); color: #000; padding: 15px; border-radius: 8px; font-weight: 800; text-align: center; margin-top: 15px; font-size: 1.1rem; }
        
        .btn { padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #1f2937; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loading-txt" style="margin-top:10px;">Pokémon Database Synchronizing...</p>
</div>

<nav>
    <div style="font-size: 1rem; font-weight: 800; color: var(--accent);">POKEMON CHAMPIONS BATTLE ADVISOR</div>
    <div style="display: flex; gap: 5px;">
        <button onclick="setLang('tr')" style="background:#2d3748; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">TR</button>
        <button onclick="setLang('en')" style="background:#2d3748; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">EN</button>
    </div>
</nav>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('box', this)">BOX</button>
    <button class="tab-btn" onclick="showTab('teams', this)">TEAMS</button>
    <button class="tab-btn" onclick="showTab('battle', this)">BATTLE</button>
</div>

<div id="box" class="content active" onscroll="handleInfiniteScroll(this)">
    <div class="card">
        <div class="filter-row">
            <input type="text" id="box-q" placeholder="Search by name..." oninput="resetAndRender()">
            <select id="box-t" onchange="resetAndRender()">
                <option value="">All Types</option>
                <option value="normal">Normal</option><option value="fire">Fire</option><option value="water">Water</option>
                <option value="grass">Grass</option><option value="electric">Electric</option><option value="ice">Ice</option>
                <option value="fighting">Fighting</option><option value="poison">Poison</option><option value="ground">Ground</option>
                <option value="flying">Flying</option><option value="psychic">Psychic</option><option value="bug">Bug</option>
                <option value="rock">Rock</option><option value="ghost">Ghost</option><option value="dragon">Dragon</option>
                <option value="dark">Dark</option><option value="steel">Steel</option><option value="fairy">Fairy</option>
            </select>
            <select id="box-r" onchange="resetAndRender()">
                <option value="0">All Regions</option>
                <option value="1">Kanto (Gen 1)</option><option value="2">Johto (Gen 2)</option>
                <option value="3">Hoenn (Gen 3)</option><option value="4">Sinnoh (Gen 4)</option>
                <option value="5">Unova (Gen 5)</option><option value="6">Kalos (Gen 6)</option>
                <option value="7">Alola (Gen 7)</option><option value="8">Galar (Gen 8)</option>
                <option value="9">Paldea (Gen 9)</option>
            </select>
        </div>
        <div class="poke-grid" id="master-grid"></div>
        <div id="scroll-anchor" style="height: 20px; text-align: center; font-size: 12px; color: #444;">Loading more...</div>
    </div>
    <div class="card">
        <h3 id="ui-my-box-title">My Collection</h3>
        <div class="poke-grid" id="my-box-grid"></div>
    </div>
</div>

<div id="teams" class="content">
    <div class="card">
        <h3 id="ui-sel-box-title">Select from My Box</h3>
        <div class="poke-grid" id="team-selector-grid"></div>
    </div>
    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="team-name-in" placeholder="Team Name">
            <button onclick="autoFillTeam()" class="btn btn-blue" id="ui-suggest-btn">Auto Suggest</button>
        </div>
        <div id="team-build-zone" class="poke-grid" style="min-height: 120px; border: 2px dashed #374151; padding: 10px; border-radius: 8px;"></div>
        <button onclick="saveTeam()" class="btn btn-green" style="margin-top:10px;" id="ui-save-team-btn">Save Team</button>
    </div>
    <div id="saved-teams-list"></div>
</div>

<div id="battle" class="content">
    <div class="card">
        <select id="battle-team-select" onchange="prepareBattleSession()"></select>
    </div>

    <div id="battle-prep-zone" class="card">
        <h3 id="ui-pick-3-title">Pick 3 for Match</h3>
        <div class="poke-grid" id="prep-team-grid"></div>
        <button onclick="suggestMatchTrio()" class="btn btn-blue" style="margin-top:10px;">Suggest 3</button>
        <button onclick="startActiveBattle()" class="btn btn-green" style="margin-top:10px;" id="ui-start-battle-btn">Start Match</button>
    </div>

    <div id="battle-arena" style="display:none;">
        <div class="battle-layout">
            <div class="battle-slot">
                <h4 style="color:var(--blue); margin:0 0 10px 0;">MY TRIO</h4>
                <div id="battle-my-trio" class="poke-grid" style="grid-template-columns: 1fr;"></div>
            </div>
            <div class="battle-slot">
                <h4 style="color:var(--red); margin:0 0 10px 0;">ENEMIES (MAX 6)</h4>
                <input type="text" id="enemy-search" list="all-pokes-list" placeholder="Add opponent..." onchange="addEnemyToBattle(this.value)">
                <div id="battle-opp-team" class="poke-grid" style="grid-template-columns: 1fr; margin-top:10px;"></div>
            </div>
        </div>
        <div id="battle-advisor-msg" class="advisor-bar">Select enemy!</div>
        <button onclick="resetBattle()" class="btn btn-red" style="margin-top:15px;">Reset Battle</button>
    </div>
</div>

<datalist id="all-pokes-list"></datalist>

<script>
    let ALL_POKEMON = [];
    let myBox = JSON.parse(localStorage.getItem('p_advisor_box')) || [];
    let savedTeams = JSON.parse(localStorage.getItem('p_advisor_teams')) || [];
    let currentTeamBuild = [];
    let lang = 'tr';
    
    // Pagination state
    let displayLimit = 50;
    let filteredList = [];

    // Battle state
    let matchTrio = [];
    let matchEnemies = [];
    let activeMyIdx = null;
    let activeOppIdx = null;

    const UI_STRINGS = {
        tr: { myBox: "Koleksiyonum", selBox: "Kutumdan Seç", suggest: "Tavsiye Et", save: "Takımı Kaydet", pick3: "Maç İçin 3 Pokemon Seç", start: "Savaşı Başlat", adv: "Rakibi seç, analiz edeyim.", keep: "Avantajlısın, kal!", swap: "Şuna geç: " },
        en: { myBox: "My Collection", selBox: "Select from Box", suggest: "Auto Suggest", save: "Save Team", pick3: "Pick 3 for Match", start: "Start Match", adv: "Select enemy to analyze.", keep: "Advantage! Keep active.", swap: "Swap to: " }
    };

    // Region Mapping
    const REGIONS = [
        {id: 1, start: 1, end: 151},    {id: 2, start: 152, end: 251},
        {id: 3, start: 252, end: 386},  {id: 4, start: 387, end: 493},
        {id: 5, start: 494, end: 649},  {id: 6, start: 650, end: 721},
        {id: 7, start: 722, end: 809},  {id: 8, start: 810, end: 905},
        {id: 9, start: 906, end: 1025}
    ];

    async function init() {
        const cache = localStorage.getItem('p_db_cache');
        if(cache) {
            ALL_POKEMON = JSON.parse(cache);
        } else {
            const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
            const data = await res.json();
            // Not: API'den tüm detayları (tipler vb.) bir kerede çekmek yasak/yavaş olduğu için 
            // isim tabanlı dinamik eşleştirme yapıyoruz.
            ALL_POKEMON = data.results.map((p, i) => ({
                id: i + 1,
                name: p.name,
                sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`,
                region: REGIONS.find(r => (i+1) >= r.start && (i+1) <= r.end)?.id || 1
            }));
            localStorage.setItem('p_db_cache', JSON.stringify(ALL_POKEMON));
        }
        document.getElementById('all-pokes-list').innerHTML = ALL_POKEMON.map(p => `<option value="${p.name}">`).join('');
        document.getElementById('loader').style.display = 'none';
        
        resetAndRender();
        renderMyBox();
        renderSavedTeams();
        updateBattleSelectors();
        updateTranslations();
    }

    // --- BOX LOGIC (INFINITE SCROLL) ---
    function resetAndRender() {
        const q = document.getElementById('box-q').value.toLowerCase();
        const r = document.getElementById('box-r').value;
        
        filteredList = ALL_POKEMON.filter(p => p.name.includes(q));
        if(r != "0") filteredList = filteredList.filter(p => p.region == r);
        
        displayLimit = 50;
        document.getElementById('master-grid').innerHTML = "";
        renderBatch();
    }

    function renderBatch() {
        const grid = document.getElementById('master-grid');
        const batch = filteredList.slice(displayLimit - 50, displayLimit);
        
        batch.forEach(p => {
            const el = document.createElement('div');
            el.className = 'poke-item';
            el.onclick = () => addToMyBox(p.id);
            el.innerHTML = `<img src="${p.sprite}" loading="lazy"><div class="name">${p.name}</div>`;
            grid.appendChild(el);
        });
    }

    function handleInfiniteScroll(container) {
        if (container.scrollTop + container.clientHeight >= container.scrollHeight - 100) {
            if (displayLimit < filteredList.length) {
                displayLimit += 50;
                renderBatch();
            }
        }
    }

    function addToMyBox(id) {
        if(!myBox.find(x => x.id === id)) {
            myBox.push(ALL_POKEMON.find(p => p.id === id));
            saveData();
            renderMyBox();
            if(document.getElementById('teams').classList.contains('active')) renderTeamSelector();
        }
    }

    function renderMyBox() {
        const grid = document.getElementById('my-box-grid');
        grid.innerHTML = myBox.map((p, i) => `
            <div class="poke-item" onclick="removeFromMyBox(${i})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function removeFromMyBox(i) { myBox.splice(i, 1); saveData(); renderMyBox(); renderTeamSelector(); }

    // --- TEAM LOGIC ---
    function renderTeamSelector() {
        document.getElementById('team-selector-grid').innerHTML = myBox.map(p => `
            <div class="poke-item" onclick="addToBuild(${p.id})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function addToBuild(id) {
        if(currentTeamBuild.length < 6) {
            currentTeamBuild.push({...myBox.find(x => x.id === id), uid: Date.now()});
            renderBuildZone();
        }
    }

    function renderBuildZone() {
        document.getElementById('team-build-zone').innerHTML = currentTeamBuild.map((p, i) => `
            <div class="poke-item" onclick="currentTeamBuild.splice(${i},1); renderBuildZone();">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function autoFillTeam() {
        if(myBox.length < 6) return alert("Box'ta en az 6 Pokemon olmalı!");
        currentTeamBuild = [...myBox].sort(() => 0.5 - Math.random()).slice(0, 6);
        renderBuildZone();
    }

    function saveTeam() {
        if(currentTeamBuild.length < 6) return alert("6 Pokemon seçmelisiniz!");
        const name = document.getElementById('team-name-in').value || `Team ${savedTeams.length + 1}`;
        savedTeams.push({ name, pokes: [...currentTeamBuild] });
        currentTeamBuild = []; saveData(); renderSavedTeams(); renderBuildZone(); updateBattleSelectors();
    }

    function renderSavedTeams() {
        document.getElementById('saved-teams-list').innerHTML = savedTeams.map((t, i) => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${t.name}</b>
                    <button class="btn-red" onclick="deleteTeam(${i})" style="width:50px; padding:2px; font-size:10px;">DEL</button>
                </div>
                <div class="poke-grid" style="margin-top:10px;">
                    ${t.pokes.map(p => `<img src="${p.sprite}" width="35">`).join('')}
                </div>
            </div>
        `).join('');
    }

    function deleteTeam(i) { savedTeams.splice(i, 1); saveData(); renderSavedTeams(); updateBattleSelectors(); }

    // --- BATTLE LOGIC ---
    function updateBattleSelectors() {
        const sel = document.getElementById('battle-team-select');
        sel.innerHTML = savedTeams.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
        prepareBattleSession();
    }

    function prepareBattleSession() {
        const idx = document.getElementById('battle-team-select').value;
        if(!savedTeams[idx]) return;
        matchTrio = savedTeams[idx].pokes.map(p => ({...p, selected: false, dead: false}));
        matchEnemies = []; activeMyIdx = null; activeOppIdx = null;
        document.getElementById('battle-prep-zone').style.display = 'block';
        document.getElementById('battle-arena').style.display = 'none';
        renderPrepGrid();
    }

    function renderPrepGrid() {
        document.getElementById('prep-team-grid').innerHTML = matchTrio.map((p, i) => `
            <div class="poke-item ${p.selected ? 'active-sel' : ''}" onclick="toggleTrioSelect(${i})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function toggleTrioSelect(i) {
        const currentCount = matchTrio.filter(p => p.selected).length;
        if(!matchTrio[i].selected && currentCount >= 3) return;
        matchTrio[i].selected = !matchTrio[i].selected;
        renderPrepGrid();
    }

    function suggestMatchTrio() {
        matchTrio.forEach(p => p.selected = false);
        matchTrio.slice(0, 3).forEach(p => p.selected = true);
        renderPrepGrid();
    }

    function startActiveBattle() {
        const selected = matchTrio.filter(p => p.selected);
        if(selected.length < 3) return alert("3 Pokemon seçmelisin!");
        matchTrio = selected.map(p => ({...p, dead: false}));
        document.getElementById('battle-prep-zone').style.display = 'none';
        document.getElementById('battle-arena').style.display = 'block';
        renderArena();
    }

    function addEnemyToBattle(name) {
        if(matchEnemies.length >= 6) return;
        const p = ALL_POKEMON.find(x => x.name === name.toLowerCase());
        if(p) {
            matchEnemies.push({...p, dead: false});
            document.getElementById('enemy-search').value = "";
            renderArena();
        }
    }

    function renderArena() {
        document.getElementById('battle-my-trio').innerHTML = matchTrio.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${activeMyIdx === i ? 'active-sel' : ''}" onclick="if(!${p.dead}) { activeMyIdx=${i}; renderArena(); }">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); matchTrio[${i}].dead=true; if(activeMyIdx==${i}) activeMyIdx=null; renderArena();" class="btn-red" style="font-size:8px; padding:2px; margin-top:4px;">KILL</button>
            </div>
        `).join('');

        document.getElementById('battle-opp-team').innerHTML = matchEnemies.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${activeOppIdx === i ? 'enemy-sel' : ''}" onclick="if(!${p.dead}) { activeOppIdx=${i}; renderArena(); }">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); matchEnemies[${i}].dead=true; if(activeOppIdx==${i}) activeOppIdx=null; renderArena();" class="btn-red" style="font-size:8px; padding:2px; margin-top:4px;">KILL</button>
            </div>
        `).join('');
        runAdvisorAnalysis();
    }

    function runAdvisorAnalysis() {
        const msg = document.getElementById('battle-advisor-msg');
        if(activeOppIdx === null) { msg.innerText = UI_STRINGS[lang].adv; return; }
        
        const alive = matchTrio.filter(p => !p.dead);
        if(activeMyIdx === null) {
            msg.innerText = UI_STRINGS[lang].swap + (alive[0] ? alive[0].name.toUpperCase() : "LOST");
        } else {
            msg.innerText = UI_STRINGS[lang].keep;
        }
    }

    function resetBattle() { matchTrio = []; matchEnemies = []; prepareBattleSession(); }

    // --- SYSTEM ---
    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'teams') renderTeamSelector();
    }

    function setLang(l) { lang = l; updateTranslations(); }
    
    function updateTranslations() {
        const t = UI_STRINGS[lang];
        document.getElementById('ui-my-box-title').innerText = t.myBox;
        document.getElementById('ui-sel-box-title').innerText = t.selBox;
        document.getElementById('ui-suggest-btn').innerText = t.suggest;
        document.getElementById('ui-save-team-btn').innerText = t.save;
        document.getElementById('ui-pick-3-title').innerText = t.pick3;
        document.getElementById('ui-start-battle-btn').innerText = t.start;
        runAdvisorAnalysis();
    }

    function saveData() {
        localStorage.setItem('p_advisor_box', JSON.stringify(myBox));
        localStorage.setItem('p_advisor_teams', JSON.stringify(savedTeams));
    }

    window.onload = init;
</script>
</body>
</html>
