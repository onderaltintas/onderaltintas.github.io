<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Pro Advisor</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #eab308; --red: #ef4444; --blue: #3b82f6; --green: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding-bottom: 50px; }
        nav { background: var(--card); padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); sticky: top; z-index: 100; }
        .tab-bar { display: flex; background: #000; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 10px; background: #334155; border: none; color: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: var(--bg); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        
        /* Box & Team Styling */
        .poke-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .poke-slot { background: #334155; border-radius: 8px; padding: 5px; text-align: center; position: relative; border: 1px solid transparent; cursor: pointer; }
        .poke-slot.selected { border-color: var(--accent); background: #475569; }
        .poke-slot img { width: 100%; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .poke-name { font-size: 9px; font-weight: bold; text-transform: uppercase; display: block; overflow: hidden; white-space: nowrap; }
        .faint { filter: grayscale(1) opacity(0.5) !important; }
        .faint-mark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--red); font-size: 40px; font-weight: bold; pointer-events: none; }

        /* Battle UI */
        .battle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .battle-side { background: #000; padding: 10px; border-radius: 8px; border: 1px solid #444; }
        .status-msg { background: var(--accent); color: var(--bg); padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 10px; min-height: 40px; }
        
        input, button { width: 100%; box-sizing: border-box; }
        .btn { border: none; border-radius: 6px; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-add { background: var(--accent); color: var(--bg); }
        .btn-action { background: var(--blue); color: white; margin-top: 10px; }
        .btn-kill { background: var(--red); color: white; margin-top: 5px; font-size: 10px; padding: 5px; }
    </style>
</head>
<body>

<nav>
    <div id="ui-title" style="font-weight: bold; font-size: 1.2rem;">CHAMPIONS PRO</div>
    <div>
        <button onclick="setLang('tr')" style="background:none; border:1px solid #555; color:white; cursor:pointer;">TR</button>
        <button onclick="setLang('en')" style="background:none; border:1px solid #555; color:white; cursor:pointer;">EN</button>
    </div>
</nav>

<div class="tab-bar">
    <button class="tab-btn active" onclick="showSection('box', this)">BOX</button>
    <button class="tab-btn" onclick="showSection('teams', this)">TEAMS</button>
    <button class="tab-btn" onclick="showSection('battle', this)">BATTLE</button>
</div>

<div class="container">
    <div id="box" class="section active">
        <div class="card">
            <h3 id="ui-box-h">Koleksiyonum</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input id="box-in" type="text" list="p-list" style="padding:10px; border-radius:6px; background:#334155; border:1px solid #555; color:white;">
                <button onclick="addToBox()" class="btn btn-add" style="width:80px;">EKLE</button>
            </div>
            <div id="box-grid" class="poke-grid"></div>
        </div>
    </div>

    <div id="teams" class="section">
        <div class="card">
            <h3 id="ui-team-h">Takım Oluştur</h3>
            <p style="font-size:11px; color:#94a3b8;">Box'tan 6 Pokemon seçip takım kaydet.</p>
            <div id="team-builder-slots" class="poke-grid" style="margin-bottom:15px; border:1px dashed var(--accent); padding:10px;"></div>
            <button onclick="saveCurrentTeam()" class="btn btn-action" id="ui-save-team">Takımı Kaydet</button>
        </div>
        <div id="saved-teams-list"></div>
    </div>

    <div id="battle" class="section">
        <div class="card">
            <select id="team-selector" onchange="loadBattleTeam()" style="padding:10px; margin-bottom:10px; background:#334155; color:white; border:none;"></select>
            
            <div class="battle-row">
                <div class="battle-side">
                    <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--blue);">MYSIDE</h4>
                    <div id="battle-my-slots" class="poke-grid" style="grid-template-columns: repeat(2, 1fr);"></div>
                </div>
                <div class="battle-side">
                    <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--red);">ENEMY</h4>
                    <input type="text" id="enemy-in" list="p-list" onchange="addEnemy()" placeholder="Add Enemy" style="font-size:10px; padding:5px; margin-bottom:5px;">
                    <div id="battle-enemy-slots" class="poke-grid" style="grid-template-columns: repeat(2, 1fr);"></div>
                </div>
            </div>

            <div id="battle-advisor" class="status-msg">Hazır. Maç başlayınca rakip Pokemonu seç.</div>
        </div>
    </div>
</div>

<datalist id="p-list">
    <option value="pikachu"><option value="charizard"><option value="mewtwo"><option value="bulbasaur"><option value="squirtle">
    <option value="gengar"><option value="lucario"><option value="dragonite"><option value="eevee">
</datalist>

<script>
    let box = JSON.parse(localStorage.getItem('box')) || [];
    let teams = JSON.parse(localStorage.getItem('teams')) || [];
    let currentTeamBuild = [];
    let battleMyTeam = [];
    let battleEnemyTeam = [];
    let myActiveIdx = null;
    let enemyActiveIdx = null;

    const texts = {
        tr: { boxH: "Koleksiyonum", teamH: "Takım Oluştur", saveTeam: "Takımı Kaydet", advStart: "Rakibi seç, tavsiye vereyim.", advKeep: "Avantajlısın, kal!", advSwap: "Tehlike! Şuna geç: " },
        en: { boxH: "My Collection", teamH: "Team Builder", saveTeam: "Save Team", advStart: "Select enemy to get advice.", advKeep: "Good match, keep!", advSwap: "Danger! Swap to: " }
    };
    let lang = 'tr';

    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function addToBox() {
        const name = document.getElementById('box-in').value.toLowerCase();
        if (!name) return;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        const data = await res.json();
        box.push({ name: data.name, sprite: data.sprites.front_default, types: data.types.map(t => t.type.name) });
        save(); renderBox();
    }

    function renderBox() {
        const grid = document.getElementById('box-grid');
        grid.innerHTML = box.map((p, i) => `
            <div class="poke-slot" onclick="toggleToTeam(${i})">
                <img src="${p.sprite}">
                <span class="poke-name">${p.name}</span>
            </div>
        `).join('');
    }

    function toggleToTeam(idx) {
        if(currentTeamBuild.length < 6) {
            currentTeamBuild.push(box[idx]);
            renderTeamBuilder();
        }
    }

    function renderTeamBuilder() {
        const area = document.getElementById('team-builder-slots');
        area.innerHTML = currentTeamBuild.map((p, i) => `
            <div class="poke-slot" onclick="currentTeamBuild.splice(${i},1); renderTeamBuilder();">
                <img src="${p.sprite}">
                <span class="poke-name">${p.name}</span>
            </div>
        `).join('');
    }

    function saveCurrentTeam() {
        if(currentTeamBuild.length === 6) {
            teams.push([...currentTeamBuild]);
            currentTeamBuild = [];
            save(); renderTeamsList(); renderTeamBuilder();
            loadTeamSelectors();
        }
    }

    function renderTeamsList() {
        const list = document.getElementById('saved-teams-list');
        list.innerHTML = teams.map((t, i) => `
            <div class="card">
                <b>Takım #${i+1}</b>
                <div class="poke-grid">${t.map(p => `<img src="${p.sprite}" width="30">`).join('')}</div>
            </div>
        `).join('');
    }

    function loadTeamSelectors() {
        const sel = document.getElementById('team-selector');
        sel.innerHTML = teams.map((t, i) => `<option value="${i}">Takım #${i+1}</option>`).join('');
    }

    function loadBattleTeam() {
        const idx = document.getElementById('team-selector').value;
        battleMyTeam = teams[idx].map(p => ({...p, dead: false}));
        renderBattleSlots();
    }

    async function addEnemy() {
        const name = document.getElementById('enemy-in').value.toLowerCase();
        if(!name) return;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
        const data = await res.json();
        battleEnemyTeam.push({ name: data.name, sprite: data.sprites.front_default, types: data.types.map(t => t.type.name), dead: false });
        document.getElementById('enemy-in').value = "";
        renderBattleSlots();
    }

    function renderBattleSlots() {
        document.getElementById('battle-my-slots').innerHTML = battleMyTeam.map((p, i) => `
            <div class="poke-slot ${myActiveIdx == i ? 'selected' : ''} ${p.dead ? 'faint' : ''}" onclick="selectMyActive(${i})">
                <img src="${p.sprite}">
                <button class="btn-kill" onclick="event.stopPropagation(); battleMyTeam[${i}].dead=true; renderBattleSlots();">DEAD</button>
                ${p.dead ? '<div class="faint-mark">X</div>' : ''}
            </div>
        `).join('');

        document.getElementById('battle-enemy-slots').innerHTML = battleEnemyTeam.map((p, i) => `
            <div class="poke-slot ${enemyActiveIdx == i ? 'selected' : ''} ${p.dead ? 'faint' : ''}" onclick="selectEnemyActive(${i})">
                <img src="${p.sprite}">
                <button class="btn-kill" onclick="event.stopPropagation(); battleEnemyTeam[${i}].dead=true; renderBattleSlots();">DEAD</button>
                ${p.dead ? '<div class="faint-mark">X</div>' : ''}
            </div>
        `).join('');
        
        analyzeBattle();
    }

    function selectMyActive(i) { if(!battleMyTeam[i].dead) { myActiveIdx = i; renderBattleSlots(); } }
    function selectEnemyActive(i) { if(!battleEnemyTeam[i].dead) { enemyActiveIdx = i; renderBattleSlots(); } }

    function analyzeBattle() {
        if(enemyActiveIdx === null) return;
        const enemy = battleEnemyTeam[enemyActiveIdx];
        const adv = document.getElementById('battle-advisor');
        
        // Basit tip analizi (Placeholder)
        let bestP = null;
        battleMyTeam.forEach((p, idx) => {
            if(!p.dead) {
                if(!bestP) bestP = p;
            }
        });

        if(myActiveIdx !== null && !battleMyTeam[myActiveIdx].dead) {
             adv.innerText = texts[lang].advKeep;
        } else {
             adv.innerText = texts[lang].advSwap + (bestP ? bestP.name : "N/A");
        }
    }

    function save() { 
        localStorage.setItem('box', JSON.stringify(box)); 
        localStorage.setItem('teams', JSON.stringify(teams));
    }

    function setLang(l) { lang = l; document.getElementById('ui-box-h').innerText = texts[l].boxH; }

    // Init
    renderBox();
    renderTeamsList();
    loadTeamSelectors();
</script>
</body>
</html>
