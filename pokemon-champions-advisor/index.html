<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Advisor Pro</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161d2f; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: sans-serif; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { background: var(--card); border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        nav { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #000; padding: 2px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #242f45; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .content { flex: 1; display: none; overflow: hidden; }
        .content.active { display: flex; flex-direction: row; }

        @media (max-width: 900px) { .content.active { flex-direction: column; } }

        /* SOL PANEL */
        .side-panel { 
            width: 320px; border-right: 1px solid #2d3748; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
            background: rgba(0,0,0,0.1);
        }
        @media (max-width: 900px) { .side-panel { width: 100%; height: 35%; border-right: none; border-bottom: 1px solid #2d3748; } }

        /* SAĞ PANEL - ASIL SCROLL BURADA */
        .main-list-area { 
            flex: 1; padding: 20px; 
            overflow-y: auto; /* Kaydırma çubuğunun çıkmasını sağlar */
            height: calc(100vh - 130px); /* Üst menüden kalan alanı hesaplar */
        }

        .poke-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; 
        }

        .poke-item { 
            background: #1f2937; border-radius: 8px; padding: 10px; 
            text-align: center; border: 2px solid transparent; cursor: pointer;
            transition: 0.15s; position: relative;
        }
        .poke-item:hover { border-color: var(--accent); transform: scale(1.02); }
        .poke-item img { width: 70px; height: 70px; object-fit: contain; }
        .poke-item .name { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 8px; display: block; }

        /* Koleksiyonum Scroll */
        #my-box-list { flex: 1; overflow-y: auto; background: #0004; border-radius: 8px; padding: 5px; }

        input, select { background: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #1f2937; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <nav>
        <div style="font-weight: 900; color: var(--accent);">POKEMON ADVISOR</div>
        <div style="display: flex; gap: 5px;">
            <button onclick="setLang('tr')">TR</button>
            <button onclick="setLang('en')">EN</button>
        </div>
    </nav>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('box', this)">BOX</button>
        <button class="tab-btn" onclick="showTab('teams', this)">TEAMS</button>
        <button class="tab-btn" onclick="showTab('battle', this)">BATTLE</button>
    </div>
</header>

<div id="box" class="content active">
    <div class="side-panel">
        <input type="text" id="q" placeholder="Pokémon Ara..." oninput="filter()">
        <select id="t" onchange="filter()">
            <option value="">Tüm Tipler</option>
            <option value="normal">Normal</option><option value="fire">Fire</option>
            <option value="water">Water</option><option value="grass">Grass</option>
            <option value="electric">Electric</option><option value="ice">Ice</option>
            <option value="fighting">Fighting</option><option value="poison">Poison</option>
            <option value="ground">Ground</option><option value="flying">Flying</option>
            <option value="psychic">Psychic</option><option value="bug">Bug</option>
            <option value="rock">Rock</option><option value="ghost">Ghost</option>
            <option value="dragon">Dragon</option><option value="dark">Dark</option>
            <option value="steel">Steel</option><option value="fairy">Fairy</option>
        </select>
        <select id="r" onchange="filter()">
            <option value="0">Tüm Bölgeler</option>
            <option value="1">Kanto</option><option value="2">Johto</option>
            <option value="3">Hoenn</option><option value="4">Sinnoh</option>
            <option value="5">Unova</option><option value="6">Kalos</option>
            <option value="7">Alola</option><option value="8">Galar</option>
            <option value="9">Paldea</option>
        </select>
        <h4 id="ui-my-title" style="margin: 10px 0 5px 0; color: var(--accent);">Koleksiyonum</h4>
        <div id="my-box-list" class="poke-grid" style="grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));"></div>
    </div>

    <div class="main-list-area" id="scroll-box">
        <div class="poke-grid" id="master-grid"></div>
        <div id="sentinel" style="height: 80px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #555;">Daha fazla yükleniyor...</div>
    </div>
</div>

<script>
    let ALL = [];
    let myBox = JSON.parse(localStorage.getItem('p_cba_box')) || [];
    let limit = 40;
    let filtered = [];

    async function init() {
        // Not: Tip verisi için normalde her pokemona istek atılır ancak performansı bozmamak için 
        // burada temel bir simülasyon yapıyoruz. Gerçek projede tam veritabanı JSON olarak çekilmelidir.
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const data = await res.json();
        ALL = data.results.map((p, i) => ({
            id: i + 1,
            name: p.name,
            img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`,
            reg: Math.ceil((i+1)/151),
            type: "" // API'den çekilebilir veya statik eklenebilir
        }));
        
        setupObserver();
        filter();
        renderMyBox();
        document.getElementById('loader').style.display = 'none';
    }

    function setupObserver() {
        const options = {
            root: document.getElementById('scroll-box'),
            threshold: 0.1
        };
        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting && limit < filtered.length) {
                limit += 40;
                renderBatch();
            }
        }, options);
        observer.observe(document.getElementById('sentinel'));
    }

    function filter() {
        const q = document.getElementById('q').value.toLowerCase();
        const r = document.getElementById('r').value;
        // Tip filtresi için ALL içindeki verilerin önceden çekilmiş olması gerekir.
        filtered = ALL.filter(p => p.name.includes(q));
        if(r != "0") filtered = filtered.filter(p => p.reg == r);
        
        limit = 40;
        document.getElementById('master-grid').innerHTML = "";
        document.getElementById('scroll-box').scrollTop = 0;
        renderBatch();
    }

    function renderBatch() {
        const grid = document.getElementById('master-grid');
        const chunk = filtered.slice(limit - 40, limit);
        chunk.forEach(p => {
            const div = document.createElement('div');
            div.className = 'poke-item';
            div.onclick = () => addToMyBox(p.id);
            div.innerHTML = `<img src="${p.img}" loading="lazy"><span class="name">${p.name}</span>`;
            grid.appendChild(div);
        });
    }

    function addToMyBox(id) {
        if(!myBox.find(x => x.id === id)) {
            myBox.push(ALL.find(p => p.id === id));
            localStorage.setItem('p_cba_box', JSON.stringify(myBox));
            renderMyBox();
        }
    }

    function renderMyBox() {
        document.getElementById('my-box-list').innerHTML = myBox.map((p, i) => `
            <div class="poke-item" style="height: 105px;" onclick="myBox.splice(${i},1); localStorage.setItem('p_cba_box', JSON.stringify(myBox)); renderMyBox();">
                <img src="${p.img}" style="width: 50px; height: 50px;">
                <span class="name" style="font-size: 8px;">${p.name}</span>
            </div>
        `).join('');
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
