<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Champions Advisor</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161d2f; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --text: #f8fafc; }
        * { box-sizing: border-box; }
        
        /* Sayfanın genel kaymasını engelliyoruz, sadece kutular kayacak */
        body { 
            background: var(--bg); color: var(--text); 
            font-family: sans-serif; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { background: var(--card); border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        nav { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #000; padding: 2px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #242f45; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .content { flex: 1; display: none; overflow: hidden; position: relative; }
        .content.active { display: flex; flex-direction: column; }

        /* BOX SECTION ÖZEL: Masaüstünde yan yana, mobilde alt alta */
        .box-layout { display: flex; flex-direction: row; height: 100%; overflow: hidden; }
        @media (max-width: 900px) { .box-layout { flex-direction: column; } }

        /* SOL PANEL: Filtreler ve Koleksiyonum */
        .side-panel { 
            width: 350px; border-right: 1px solid #2d3748; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px; flex-shrink: 0;
            background: rgba(0,0,0,0.2);
        }
        @media (max-width: 900px) { .side-panel { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid #2d3748; } }

        /* SAĞ PANEL: Genel Pokemon Listesi (SCROLL BURADA) */
        .main-list-area { 
            flex: 1; padding: 15px; overflow-y: auto; 
            display: flex; flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .poke-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
        }

        .poke-item { 
            background: #1f2937; border-radius: 8px; padding: 10px; 
            text-align: center; border: 2px solid transparent; cursor: pointer;
            transition: 0.2s;
        }
        .poke-item:hover { border-color: var(--accent); }
        .poke-item img { width: 64px; height: 64px; object-fit: contain; }
        .poke-item .name { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px; display: block; overflow: hidden; }

        /* My Box Özel */
        #my-box-list { flex: 1; overflow-y: auto; background: #0004; border-radius: 8px; padding: 5px; }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; width: 100%; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #1f2937; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
    <nav>
        <div style="font-weight: 900; color: var(--accent);">POKEMON ADVISOR</div>
        <div style="display: flex; gap: 5px;">
            <button onclick="setLang('tr')">TR</button>
            <button onclick="setLang('en')">EN</button>
        </div>
    </nav>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('box', this)">BOX</button>
        <button class="tab-btn" onclick="showTab('teams', this)">TEAMS</button>
        <button class="tab-btn" onclick="showTab('battle', this)">BATTLE</button>
    </div>
</header>

<div id="box" class="content active">
    <div class="box-layout">
        <div class="side-panel">
            <div class="filter-group">
                <input type="text" id="q" placeholder="Ara..." oninput="filter()">
                <select id="r" onchange="filter()">
                    <option value="0">Tüm Bölgeler</option>
                    <option value="1">Kanto</option><option value="2">Johto</option>
                    <option value="3">Hoenn</option><option value="4">Sinnoh</option>
                    <option value="5">Unova</option><option value="6">Kalos</option>
                    <option value="7">Alola</option><option value="8">Galar</option>
                    <option value="9">Paldea</option>
                </select>
            </div>
            <h4 id="ui-my-title" style="margin: 10px 0 5px 0; color: var(--accent);">Koleksiyonum</h4>
            <div id="my-box-list" class="poke-grid" style="grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));"></div>
        </div>

        <div class="main-list-area" id="main-scroll-container">
            <div class="poke-grid" id="master-grid"></div>
            <div id="sentinel" style="height: 100px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #444;">Yükleniyor...</div>
        </div>
    </div>
</div>

<div id="teams" class="content" style="overflow-y: auto; padding: 20px;">
    <div class="card">
        <h3>Koleksiyonundan Takım Kur</h3>
        <div id="team-pick-grid" class="poke-grid"></div>
    </div>
    <div class="card">
        <input type="text" id="team-name" placeholder="Takım Adı">
        <div id="build-zone" class="poke-grid" style="min-height: 120px; border: 2px dashed #444; margin: 10px 0;"></div>
        <button onclick="saveTeam()" class="btn btn-green" style="padding: 15px; width: 100%; background: var(--green); color: white; border: none; font-weight: bold; cursor: pointer;">TAKIMI KAYDET</button>
    </div>
</div>

<script>
    let ALL = [];
    let myBox = JSON.parse(localStorage.getItem('p_cba_box')) || [];
    let teams = JSON.parse(localStorage.getItem('p_cba_teams')) || [];
    let limit = 40;
    let filtered = [];

    async function init() {
        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
        const data = await res.json();
        ALL = data.results.map((p, i) => ({
            id: i + 1,
            name: p.name,
            img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`,
            reg: Math.ceil((i+1)/151)
        }));
        
        setupObserver();
        filter();
        renderMyBox();
        document.getElementById('loader').style.display = 'none';
    }

    function setupObserver() {
        // Observer artık sayfanın değil, listenin içindeki sentinel'ı izliyor
        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting && limit < filtered.length) {
                limit += 40;
                renderBatch();
            }
        }, { root: document.getElementById('main-scroll-container'), threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));
    }

    function filter() {
        const q = document.getElementById('q').value.toLowerCase();
        const r = document.getElementById('r').value;
        filtered = ALL.filter(p => p.name.includes(q));
        if(r != "0") filtered = filtered.filter(p => p.reg == r);
        
        limit = 40;
        document.getElementById('master-grid').innerHTML = "";
        document.getElementById('main-scroll-container').scrollTop = 0;
        renderBatch();
    }

    function renderBatch() {
        const grid = document.getElementById('master-grid');
        const chunk = filtered.slice(limit - 40, limit);
        chunk.forEach(p => {
            const div = document.createElement('div');
            div.className = 'poke-item';
            div.onclick = () => addToMyBox(p.id);
            div.innerHTML = `<img src="${p.img}" loading="lazy"><span class="name">${p.name}</span>`;
            grid.appendChild(div);
        });
    }

    function addToMyBox(id) {
        if(!myBox.find(x => x.id === id)) {
            myBox.push(ALL.find(p => p.id === id));
            localStorage.setItem('p_cba_box', JSON.stringify(myBox));
            renderMyBox();
        }
    }

    function renderMyBox() {
        document.getElementById('my-box-list').innerHTML = myBox.map((p, i) => `
            <div class="poke-item" style="height: 100px;" onclick="myBox.splice(${i},1); localStorage.setItem('p_cba_box', JSON.stringify(myBox)); renderMyBox();">
                <img src="${p.img}" style="width: 40px; height: 40px;">
                <span class="name" style="font-size: 8px;">${p.name}</span>
            </div>
        `).join('');
        // Takım kurma gridini de güncelle
        if(document.getElementById('teams').classList.contains('active')) renderTeamPicker();
    }

    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'teams') renderTeamPicker();
    }

    function renderTeamPicker() {
        document.getElementById('team-pick-grid').innerHTML = myBox.map(p => `
            <div class="poke-item" onclick="/* Takıma ekleme kodu */">
                <img src="${p.img}">
                <span class="name">${p.name}</span>
            </div>
        `).join('');
    }

    window.onload = init;
</script>
</body>
</html>
