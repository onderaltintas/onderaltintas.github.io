<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeChampions Advisor</title>
    <style>
        /* SAF CSS - Tailwind Bağımlılığı Kaldırıldı */
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 5rem;
        }
        nav {
            background-color: #1e293b;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 1rem;
        }
        .card {
            background-color: #1e293b;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            margin-bottom: 1.5rem;
        }
        .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        input {
            flex: 1;
            padding: 0.5rem;
            border-radius: 0.25rem;
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
            font-size: 0.875rem;
        }
        button {
            cursor: pointer;
            border: none;
            border-radius: 0.25rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .btn-yellow { background-color: #eab308; color: #0f172a; padding: 0.5rem 1rem; }
        .btn-red { 
            background-color: #dc2626; color: white; width: 100%; 
            padding: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
        .pokemon-item {
            background-color: #334155;
            padding: 0.5rem;
            border-radius: 0.25rem;
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #475569;
        }
        .pokemon-item img { width: 40px; height: 40px; }
        .pokemon-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .remove-btn {
            position: absolute; top: -5px; right: -5px;
            background-color: #ef4444; color: white;
            border-radius: 9999px; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; font-size: 10px;
        }
        .active-lang { border: 2px solid #eab308 !important; background-color: #475569 !important; }
        .hidden { display: none; }
        .result-item {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #0f172a; padding: 0.75rem; border-radius: 0.25rem;
            border-left: 4px solid #eab308; margin-bottom: 0.5rem;
        }
        .text-yellow { color: #eab308; }
        .text-red { color: #f87171; }
        .text-gray { color: #94a3b8; font-size: 12px; }
    </style>
</head>
<body>

    <nav>
        <h1 id="ui-title" style="margin:0; font-size: 1.25rem; color: #eab308;">CHAMPIONS ADVISOR</h1>
        <div>
            <button id="btn-tr" style="padding: 4px 8px; font-size: 12px; background: #334155; color:white;">TR</button>
            <button id="btn-en" style="padding: 4px 8px; font-size: 12px; background: #334155; color:white;">EN</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2 id="ui-my-box-title" style="margin: 0 0 10px 0; font-size: 1.1rem; border-bottom: 1px solid #334155;"></h2>
            <div class="input-group">
                <input id="search-input" type="text">
                <button id="ui-add-btn" class="btn-yellow"></button>
            </div>
            <div id="my-box-list" class="grid"></div>
        </div>

        <div class="card">
            <h2 id="ui-battle-title" class="text-red" style="margin: 0 0 5px 0;"></h2>
            <p id="ui-battle-desc" class="text-gray" style="margin-bottom: 10px;"></p>
            
            <div class="grid-3" style="margin-bottom: 1rem;">
                <input type="text" class="opp-input" data-idx="1">
                <input type="text" class="opp-input" data-idx="2">
                <input type="text" class="opp-input" data-idx="3">
                <input type="text" class="opp-input" data-idx="4">
                <input type="text" class="opp-input" data-idx="5">
                <input type="text" class="opp-input" data-idx="6">
            </div>
            
            <button id="ui-analyze-btn" class="btn-red"></button>
            
            <div id="battle-result" class="hidden" style="margin-top: 1rem; border-top: 1px solid #334155; padding-top: 1rem;">
                <h3 id="ui-result-title" style="text-align: center; color: #eab308; text-decoration: underline; margin-bottom: 10px;"></h3>
                <div id="suggestion-list"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const translations = {
                tr: {
                    title: "CHAMPIONS REHBERİ",
                    myBox: "Benim Kutum",
                    searchPlaceholder: "Pokemon ismi...",
                    oppPlaceholder: "Rakip ",
                    addBtn: "EKLE",
                    battleTitle: "SAVAŞ MODU",
                    battleDesc: "Rakibin 6 Pokemonunu giriniz:",
                    analyzeBtn: "ANALİZ ET VE SEÇ",
                    resultTitle: "ÖNERİLEN SEÇİM SIRASI",
                    advantage: "AVANTAJLI",
                    errorMin: "Kutunda en az 3, rakipte en az 1 pokemon olmalı!",
                    errorNotFound: "Pokemon bulunamadı!"
                },
                en: {
                    title: "CHAMPIONS ADVISOR",
                    myBox: "My Box",
                    searchPlaceholder: "Pokemon name...",
                    oppPlaceholder: "Opp ",
                    addBtn: "ADD",
                    battleTitle: "BATTLE MODE",
                    battleDesc: "Enter opponent's 6 Pokemon:",
                    analyzeBtn: "ANALYZE & SELECT",
                    resultTitle: "SUGGESTED SELECTION ORDER",
                    advantage: "ADVANTAGEOUS",
                    errorMin: "Need 3 in Box and at least 1 opponent!",
                    errorNotFound: "Pokemon not found!"
                }
            };

            let currentLang = localStorage.getItem('lang') || 'tr';
            let myBox = JSON.parse(localStorage.getItem('myBox')) || [];
            const API_URL = "https://pokeapi.co/api/v2/pokemon/";

            window.setLanguage = (lang) => {
                currentLang = lang;
                localStorage.setItem('lang', lang);
                updateUI();
                renderBox();
            };

            function updateUI() {
                const t = translations[currentLang];
                document.getElementById('ui-title').innerText = t.title;
                document.getElementById('ui-my-box-title').innerText = t.myBox;
                document.getElementById('search-input').placeholder = t.searchPlaceholder;
                document.getElementById('ui-add-btn').innerText = t.addBtn;
                document.getElementById('ui-battle-title').innerText = t.battleTitle;
                document.getElementById('ui-battle-desc').innerText = t.battleDesc;
                document.getElementById('ui-analyze-btn').innerText = t.analyzeBtn;
                document.getElementById('ui-result-title').innerText = t.resultTitle;

                document.querySelectorAll('.opp-input').forEach(i => {
                    i.placeholder = t.oppPlaceholder + i.dataset.idx;
                });

                document.getElementById('btn-tr').className = currentLang === 'tr' ? 'active-lang' : '';
                document.getElementById('btn-en').className = currentLang === 'en' ? 'active-lang' : '';
            }

            window.searchPokemon = async () => {
                const name = document.getElementById('search-input').value.toLowerCase().trim();
                if (!name) return;
                try {
                    const response = await fetch(`${API_URL}${name}`);
                    if (!response.ok) throw new Error(translations[currentLang].errorNotFound);
                    const data = await response.json();
                    myBox.push({
                        name: data.name,
                        types: data.types.map(t => t.type.name),
                        sprite: data.sprites.front_default
                    });
                    localStorage.setItem('myBox', JSON.stringify(myBox));
                    renderBox();
                    document.getElementById('search-input').value = '';
                } catch (err) { alert(err.message); }
            };

            window.removePokemon = (index) => {
                myBox.splice(index, 1);
                localStorage.setItem('myBox', JSON.stringify(myBox));
                renderBox();
            };

            function renderBox() {
                const list = document.getElementById('my-box-list');
                list.innerHTML = myBox.map((p, index) => `
                    <div class="pokemon-item">
                        <img src="${p.sprite}">
                        <span>${p.name}</span>
                        <button onclick="removePokemon(${index})" class="remove-btn">×</button>
                    </div>
                `).join('');
            }

            window.analyzeBattle = async () => {
                const names = Array.from(document.querySelectorAll('.opp-input')).map(i => i.value.toLowerCase().trim()).filter(n => n);
                if (myBox.length < 3 || names.length === 0) { alert(translations[currentLang].errorMin); return; }
                
                // Basit seçim algoritması (ilk 3)
                const sorted = [...myBox].slice(0, 3);
                const container = document.getElementById('battle-result');
                const list = document.getElementById('suggestion-list');
                container.classList.remove('hidden');
                list.innerHTML = sorted.map((p, i) => `
                    <div class="result-item">
                        <b class="text-yellow">${i+1}</b>
                        <img src="${p.sprite}" style="width:40px;">
                        <span style="flex:1; padding: 0 10px; font-weight:bold; font-size:12px;">${p.name.toUpperCase()}</span>
                        <span style="font-size:10px; color:#4ade80;">${translations[currentLang].advantage}</span>
                    </div>
                `).join('');
            };

            document.getElementById('btn-tr').addEventListener('click', () => setLanguage('tr'));
            document.getElementById('btn-en').addEventListener('click', () => setLanguage('en'));
            document.getElementById('ui-add-btn').addEventListener('click', searchPokemon);
            document.getElementById('ui-analyze-btn').addEventListener('click', analyzeBattle);

            updateUI();
            renderBox();
        });
    </script>
</body>
</html>
