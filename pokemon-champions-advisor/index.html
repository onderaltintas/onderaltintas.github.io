<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeChampions Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-lang { border: 2px solid #eab308; background: #475569 !important; }
        .opp-input::placeholder { color: #94a3b8; opacity: 0.7; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen pb-20 font-sans">

    <nav class="bg-slate-800 p-4 sticky top-0 z-50 shadow-xl flex justify-between items-center">
        <h1 id="ui-title" class="text-xl font-bold text-yellow-400">CHAMPIONS ADVISOR</h1>
        <div class="flex gap-2">
            <button id="btn-tr" class="px-3 py-1 rounded text-xs bg-slate-700 font-bold">TR</button>
            <button id="btn-en" class="px-3 py-1 rounded text-xs bg-slate-700 font-bold">EN</button>
        </div>
    </nav>

    <main class="p-4 max-w-md mx-auto space-y-6">
        
        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <h2 id="ui-my-box-title" class="text-lg font-semibold mb-3 border-b border-slate-700 pb-1"></h2>
            <div class="flex gap-2 mb-4">
                <input id="search-input" type="text" class="flex-1 p-2 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-yellow-500 text-sm">
                <button id="ui-add-btn" class="bg-yellow-500 text-slate-900 px-4 py-2 rounded font-bold text-sm uppercase"></button>
            </div>
            <div id="my-box-list" class="grid grid-cols-2 gap-2"></div>
        </section>

        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <h2 id="ui-battle-title" class="text-lg font-semibold mb-1 text-red-400"></h2>
            <p id="ui-battle-desc" class="text-xs mb-3 text-slate-400"></p>
            
            <div id="opponent-selection" class="grid grid-cols-3 gap-2 mb-4">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="1">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="2">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="3">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="4">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="5">
                <input type="text" class="opp-input p-2 text-xs rounded bg-slate-700 border border-slate-600" data-idx="6">
            </div>
            
            <button id="ui-analyze-btn" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold uppercase tracking-wider transition"></button>
            
            <div id="battle-result" class="mt-4 hidden border-t border-slate-700 pt-4">
                <h3 id="ui-result-title" class="text-center font-bold text-yellow-400 mb-3 underline uppercase"></h3>
                <div id="suggestion-list" class="space-y-2"></div>
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const translations = {
                tr: {
                    title: "CHAMPIONS REHBERİ",
                    myBox: "Benim Kutum",
                    searchPlaceholder: "Pokemon ismi (İngilizce)...",
                    oppPlaceholder: "Rakip ",
                    addBtn: "EKLE",
                    battleTitle: "SAVAŞ MODU",
                    battleDesc: "Rakibin 6 Pokemonunu giriniz:",
                    analyzeBtn: "ANALİZ ET VE SEÇ",
                    resultTitle: "ÖNERİLEN SEÇİM SIRASI",
                    advantage: "AVANTAJLI",
                    errorMin: "Kutunda en az 3, rakipte en az 1 pokemon olmalı!",
                    errorNotFound: "Pokemon bulunamadı!"
                },
                en: {
                    title: "CHAMPIONS ADVISOR",
                    myBox: "My Box",
                    searchPlaceholder: "Pokemon name (English)...",
                    oppPlaceholder: "Opponent ",
                    addBtn: "ADD",
                    battleTitle: "BATTLE MODE",
                    battleDesc: "Enter opponent's 6 Pokemon:",
                    analyzeBtn: "ANALYZE & SELECT",
                    resultTitle: "SUGGESTED SELECTION ORDER",
                    advantage: "ADVANTAGEOUS",
                    errorMin: "Need 3 in Box and at least 1 opponent!",
                    errorNotFound: "Pokemon not found!"
                }
            };

            const typeChart = {
                fire: { grass: 2, ice: 2, bug: 2, steel: 2, water: 0.5, fire: 0.5, rock: 0.5, dragon: 0.5 },
                water: { fire: 2, ground: 2, rock: 2, water: 0.5, grass: 0.5, dragon: 0.5 },
                grass: { water: 2, ground: 2, rock: 2, fire: 0.5, grass: 0.5, poison: 0.5, flying: 0.5, bug: 0.5, dragon: 0.5, steel: 0.5 },
                electric: { water: 2, flying: 2, electric: 0.5, grass: 0.5, dragon: 0.5, ground: 0 },
                // ... (Diğer tipler basitlik adına 1x kabul edilir, istenirse genişletilebilir)
            };

            let currentLang = localStorage.getItem('lang') || 'tr';
            let myBox = JSON.parse(localStorage.getItem('myBox')) || [];
            const API_URL = "https://pokeapi.co/api/v2/pokemon/";

            window.setLanguage = (lang) => {
                currentLang = lang;
                localStorage.setItem('lang', lang);
                updateUI();
                renderBox();
            };

            function updateUI() {
                const t = translations[currentLang];
                document.getElementById('ui-title').innerText = t.title;
                document.getElementById('ui-my-box-title').innerText = t.myBox;
                document.getElementById('search-input').placeholder = t.searchPlaceholder;
                document.getElementById('ui-add-btn').innerText = t.addBtn;
                document.getElementById('ui-battle-title').innerText = t.battleTitle;
                document.getElementById('ui-battle-desc').innerText = t.battleDesc;
                document.getElementById('ui-analyze-btn').innerText = t.analyzeBtn;
                document.getElementById('ui-result-title').innerText = t.resultTitle;

                document.querySelectorAll('.opp-input').forEach(i => {
                    i.placeholder = t.oppPlaceholder + i.dataset.idx;
                });

                document.getElementById('btn-tr').className = currentLang === 'tr' ? 'px-3 py-1 rounded text-xs active-lang font-bold' : 'px-3 py-1 rounded text-xs bg-slate-700 font-bold';
                document.getElementById('btn-en').className = currentLang === 'en' ? 'px-3 py-1 rounded text-xs active-lang font-bold' : 'px-3 py-1 rounded text-xs bg-slate-700 font-bold';
            }

            window.searchPokemon = async () => {
                const name = document.getElementById('search-input').value.toLowerCase().trim();
                if (!name) return;

                try {
                    const response = await fetch(`${API_URL}${name}`);
                    if (!response.ok) throw new Error(translations[currentLang].errorNotFound);
                    const data = await response.json();

                    const newPokemon = {
                        id: data.id,
                        name: data.name,
                        types: data.types.map(t => t.type.name),
                        sprite: data.sprites.front_default,
                        base_stats: data.stats.reduce((acc, s) => ({...acc, [s.stat.name]: s.base_stat}), {})
                    };

                    myBox.push(newPokemon);
                    localStorage.setItem('myBox', JSON.stringify(myBox));
                    renderBox();
                    document.getElementById('search-input').value = '';
                } catch (err) {
                    alert(err.message);
                }
            };

            window.removePokemon = (index) => {
                myBox.splice(index, 1);
                localStorage.setItem('myBox', JSON.stringify(myBox));
                renderBox();
            };

            function renderBox() {
                const list = document.getElementById('my-box-list');
                list.innerHTML = myBox.map((p, index) => `
                    <div class="bg-slate-700 p-2 rounded relative flex items-center gap-2 border border-slate-600 pokemon-card">
                        <img src="${p.sprite}" class="w-10 h-10">
                        <div class="text-[10px] uppercase font-bold truncate">${p.name}
