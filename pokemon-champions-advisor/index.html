<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Champions Battle Advisor</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        nav { background: var(--card); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; z-index: 100; }
        .tabs { display: flex; background: #000; padding: 4px; gap: 4px; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: #334155; color: #94a3b8; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .tab-btn.active { background: var(--accent); color: #000; }

        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; -webkit-overflow-scrolling: touch; }
        .content.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        
        /* Grid Layout Fix */
        .poke-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; width: 100%; }
        .poke-item { background: #0f172a; border-radius: 10px; padding: 10px; text-align: center; border: 2px solid transparent; cursor: pointer; position: relative; height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s; }
        .poke-item:hover { transform: translateY(-3px); border-color: var(--accent); }
        .poke-item img { width: 72px; height: 72px; object-fit: contain; }
        .poke-item .name { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: 8px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Persistent Filters for Desktop */
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; position: sticky; top: -20px; background: var(--bg); padding: 10px 0; z-index: 50; }
        .filter-row input, .filter-row select { flex: 1; min-width: 150px; background: #1e293b; border: 1px solid #475569; color: white; padding: 12px; border-radius: 8px; outline: none; }
        .filter-row input:focus { border-color: var(--accent); }

        /* Battle Layout (Desktop Optimized) */
        .battle-arena-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .side-container { border: 2px solid #334155; border-radius: 15px; padding: 15px; background: rgba(0,0,0,0.2); }
        .active-sel { border-color: var(--green) !important; background: rgba(16, 185, 129, 0.15) !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .enemy-sel { border-color: var(--red) !important; background: rgba(239, 68, 68, 0.15) !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .faint { filter: grayscale(1) opacity(0.5); pointer-events: none; }
        .faint::after { content: 'DEAD'; position: absolute; background: var(--red); color: white; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; top: 10px; }

        .adv-banner { background: var(--accent); color: #000; padding: 18px; border-radius: 10px; font-weight: 800; text-align: center; margin-top: 20px; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #334155; border-top: 5px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h2 id="load-msg">Synchronizing Database...</h2>
</div>

<nav>
    <div style="font-weight: 900; color: var(--accent); letter-spacing: 1px;">POKEMON CHAMPIONS BATTLE ADVISOR</div>
    <div style="display: flex; gap: 10px;">
        <button onclick="setLang('tr')" style="background:#334155; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold;">TR</button>
        <button onclick="setLang('en')" style="background:#334155; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold;">EN</button>
    </div>
</nav>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('box', this)">BOX</button>
    <button class="tab-btn" onclick="showTab('teams', this)">TEAMS</button>
    <button class="tab-btn" onclick="showTab('battle', this)">BATTLE</button>
</div>

<div id="box" class="content active">
    <div class="card">
        <div class="filter-row">
            <input type="text" id="q" placeholder="Pokemon Name..." oninput="filter()">
            <select id="t" onchange="filter()">
                <option value="">All Types</option>
                <option value="normal">Normal</option><option value="fire">Fire</option><option value="water">Water</option>
                <option value="grass">Grass</option><option value="electric">Electric</option><option value="ice">Ice</option>
                <option value="fighting">Fighting</option><option value="poison">Poison</option><option value="ground">Ground</option>
                <option value="flying">Flying</option><option value="psychic">Psychic</option><option value="bug">Bug</option>
                <option value="rock">Rock</option><option value="ghost">Ghost</option><option value="dragon">Dragon</option>
                <option value="dark">Dark</option><option value="steel">Steel</option><option value="fairy">Fairy</option>
            </select>
            <select id="r" onchange="filter()">
                <option value="0">All Regions</option>
                <option value="1">Kanto</option><option value="2">Johto</option><option value="3">Hoenn</option>
                <option value="4">Sinnoh</option><option value="5">Unova</option><option value="6">Kalos</option>
                <option value="7">Alola</option><option value="8">Galar</option><option value="9">Paldea</option>
            </select>
        </div>
        <div class="poke-grid" id="master-grid"></div>
        <div id="sentinel" style="height: 50px; display: flex; align-items: center; justify-content: center; color: #444;">--- END OF LIST ---</div>
    </div>
    <div class="card">
        <h3 id="ui-box-title">My Collection</h3>
        <div class="poke-grid" id="my-box-grid"></div>
    </div>
</div>

<div id="teams" class="content">
    <div class="card">
        <h3 id="ui-sel-title">Add from My Box</h3>
        <div class="poke-grid" id="team-sel-grid"></div>
    </div>
    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="team-name" placeholder="Team Name..." style="flex:2; padding:12px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:white;">
            <button onclick="autoFill()" class="btn btn-blue" id="ui-auto-btn" style="flex:1;">Auto</button>
        </div>
        <div id="current-build" class="poke-grid" style="min-height:140px; border:3px dashed #334155; padding:15px; border-radius:12px; background:rgba(0,0,0,0.1);"></div>
        <button onclick="saveTeam()" class="btn btn-green" style="margin-top:15px;" id="ui-save-btn">Save Team</button>
    </div>
    <div id="saved-list"></div>
</div>

<div id="battle" class="content">
    <div class="card">
        <select id="battle-team-pick" onchange="loadMatchPrep()" style="padding:15px; font-size:1rem;"></select>
    </div>

    <div id="prep-screen" class="card">
        <h3 id="ui-pick3-title">Pick 3 for Match</h3>
        <div class="poke-grid" id="prep-grid"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
            <button onclick="quickPick3()" class="btn btn-blue">Suggest 3</button>
            <button onclick="launchBattle()" class="btn btn-green" id="ui-launch-btn">Start Match</button>
        </div>
    </div>

    <div id="active-screen" style="display:none;">
        <div class="battle-arena-grid">
            <div class="side-container">
                <h4 style="color:var(--blue); margin:0 0 15px 0; text-align:center;">MY MATCH TRIO</h4>
                <div id="arena-my" class="poke-grid" style="grid-template-columns: 1fr;"></div>
            </div>
            <div class="side-container">
                <h4 style="color:var(--red); margin:0 0 15px 0; text-align:center;">ENEMIES (MAX 6)</h4>
                <input type="text" id="enemy-in" list="p-list" placeholder="Search enemy..." onchange="addEnemy(this.value)" style="width:100%; padding:12px; border-radius:8px; margin-bottom:15px; background:#0f172a; color:white; border:1px solid #475569;">
                <div id="arena-opp" class="poke-grid" style="grid-template-columns: 1fr;"></div>
            </div>
        </div>
        <div id="adv-box" class="adv-banner">Select enemy to start!</div>
        <button onclick="resetMatch()" class="btn btn-red" style="margin-top:20px;">Reset Battle</button>
    </div>
</div>

<datalist id="p-list"></datalist>

<script>
    let ALL = [];
    let box = JSON.parse(localStorage.getItem('p_cba_box')) || [];
    let teams = JSON.parse(localStorage.getItem('p_cba_teams')) || [];
    let build = [];
    let lang = 'tr';
    
    // Pagination & Filter
    let filtered = [];
    let limit = 40;
    
    // Match state
    let mTrio = [];
    let mOpp = [];
    let mMyIdx = null;
    let mOppIdx = null;

    const UI = {
        tr: { box: "Koleksiyonum", sel: "Kutumdan Ekle", auto: "Tavsiye", save: "Takımı Kaydet", pick3: "Maç İçin 3 Seç", launch: "Savaşı Başlat", adv: "Rakibi seç, analiz edeyim.", keep: "Avantajlısın, kal!", swap: "Değiştir: " },
        en: { box: "My Collection", sel: "Add from Box", auto: "Auto", save: "Save Team", pick3: "Pick 3 for Match", launch: "Start Match", adv: "Select enemy to analyze.", keep: "Keep! Advantage.", swap: "Swap to: " }
    };

    // Region Data
    const REGS = [
        {id:1, s:1, e:151}, {id:2, s:152, e:251}, {id:3, s:252, e:386},
        {id:4, s:387, e:493}, {id:5, s:494, e:649}, {id:6, s:650, e:721},
        {id:7, s:722, e:809}, {id:8, s:810, e:905}, {id:9, s:906, e:1025}
    ];

    async function init() {
        const cached = localStorage.getItem('p_db_full');
        if(cached) {
            ALL = JSON.parse(cached);
        } else {
            const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
            const data = await res.json();
            // Basit tip haritalama (API her pokemon için ayrı çağrı istediğinden isimden çıkarım yapıyoruz)
            ALL = data.results.map((p, i) => {
                const id = i + 1;
                return {
                    id, name: p.name,
                    img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`,
                    reg: REGS.find(r => id >= r.s && id <= r.e)?.id || 1,
                    type: "normal" // Placeholder
                };
            });
            localStorage.setItem('p_db_full', JSON.stringify(ALL));
        }
        document.getElementById('p-list').innerHTML = ALL.map(p => `<option value="${p.name}">`).join('');
        document.getElementById('loader').style.display = 'none';
        
        setupObserver();
        filter();
        renderBox();
        renderSaved();
        updateBattleTeams();
        trans();
    }

    // --- INFINITE SCROLL OBSERVER ---
    function setupObserver() {
        const sentinel = document.getElementById('sentinel');
        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting && limit < filtered.length) {
                limit += 40;
                renderMaster();
            }
        }, { threshold: 0.1 });
        observer.observe(sentinel);
    }

    function filter() {
        const q = document.getElementById('q').value.toLowerCase();
        const r = document.getElementById('r').value;
        filtered = ALL.filter(p => p.name.includes(q));
        if(r != "0") filtered = filtered.filter(p => p.reg == r);
        
        limit = 40;
        document.getElementById('master-grid').innerHTML = "";
        renderMaster();
    }

    function renderMaster() {
        const grid = document.getElementById('master-grid');
        const chunk = filtered.slice(limit - 40, limit);
        chunk.forEach(p => {
            const div = document.createElement('div');
            div.className = 'poke-item';
            div.onclick = () => addToBox(p.id);
            div.innerHTML = `<img src="${p.img}" loading="lazy"><div class="name">${p.name}</div>`;
            grid.appendChild(div);
        });
    }

    function addToBox(id) {
        if(!box.find(x => x.id === id)) {
            box.push(ALL.find(p => p.id === id));
            save(); renderBox();
            if(document.getElementById('teams').classList.contains('active')) renderTeamSelector();
        }
    }

    function renderBox() {
        document.getElementById('my-box-grid').innerHTML = box.map((p, i) => `
            <div class="poke-item" onclick="box.splice(${i},1); save(); renderBox(); renderTeamSelector();">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    // --- TEAM LOGIC ---
    function renderTeamSelector() {
        document.getElementById('team-sel-grid').innerHTML = box.map(p => `
            <div class="poke-item" onclick="addToBuild(${p.id})">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function addToBuild(id) {
        if(build.length < 6) {
            build.push({...box.find(x => x.id === id), uid: Date.now()});
            renderBuild();
        }
    }

    function renderBuild() {
        document.getElementById('current-build').innerHTML = build.map((p, i) => `
            <div class="poke-item" onclick="build.splice(${i},1); renderBuild();">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function autoFill() {
        if(box.length < 6) return alert("Min. 6 Pokemon in Box!");
        build = [...box].sort(() => 0.5 - Math.random()).slice(0, 6);
        renderBuild();
    }

    function saveTeam() {
        if(build.length < 6) return alert("Select 6!");
        teams.push({ name: document.getElementById('team-name').value || `Team ${teams.length+1}`, pokes: [...build] });
        build = []; save(); renderSaved(); renderBuild(); updateBattleTeams();
    }

    function renderSaved() {
        document.getElementById('saved-list').innerHTML = teams.map((t, i) => `
            <div class="card" style="display:flex; flex-direction:column; gap:10px;">
                <div style="display:flex; justify-content:space-between;"><b>${t.name}</b> <button onclick="teams.splice(${i},1); save(); renderSaved(); updateBattleTeams();" style="color:var(--red); background:none; border:none; cursor:pointer;">X</button></div>
                <div class="poke-grid">${t.pokes.map(p => `<img src="${p.img}" width="32">`).join('')}</div>
            </div>
        `).join('');
    }

    // --- BATTLE LOGIC ---
    function updateBattleTeams() {
        const s = document.getElementById('battle-team-pick');
        s.innerHTML = teams.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
        loadMatchPrep();
    }

    function loadMatchPrep() {
        const idx = document.getElementById('battle-team-pick').value;
        if(!teams[idx]) return;
        mTrio = teams[idx].pokes.map(p => ({...p, selected: false}));
        mOpp = []; mMyIdx = null; mOppIdx = null;
        document.getElementById('prep-screen').style.display = 'block';
        document.getElementById('active-screen').style.display = 'none';
        renderPrep();
    }

    function renderPrep() {
        document.getElementById('prep-grid').innerHTML = mTrio.map((p, i) => `
            <div class="poke-item ${p.selected ? 'active-sel' : ''}" onclick="togglePrep(${i})">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function togglePrep(i) {
        const count = mTrio.filter(p => p.selected).length;
        if(!mTrio[i].selected && count >= 3) return;
        mTrio[i].selected = !mTrio[i].selected;
        renderPrep();
    }

    function quickPick3() {
        mTrio.forEach(p => p.selected = false);
        mTrio.slice(0,3).forEach(p => p.selected = true);
        renderPrep();
    }

    function launchBattle() {
        const final3 = mTrio.filter(p => p.selected);
        if(final3.length < 3) return alert("Select 3!");
        mTrio = final3.map(p => ({...p, dead: false}));
        document.getElementById('prep-screen').style.display = 'none';
        document.getElementById('active-screen').style.display = 'block';
        renderArena();
    }

    function addEnemy(name) {
        if(mOpp.length >= 6) return;
        const p = ALL.find(x => x.name === name.toLowerCase());
        if(p) {
            mOpp.push({...p, dead: false});
            document.getElementById('enemy-in').value = "";
            renderArena();
        }
    }

    function renderArena() {
        document.getElementById('arena-my').innerHTML = mTrio.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${mMyIdx === i ? 'active-sel' : ''}" onclick="if(!${p.dead}) { mMyIdx=${i}; renderArena(); }">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); mTrio[${i}].dead=true; if(mMyIdx==${i}) mMyIdx=null; renderArena();" class="btn-red" style="font-size:9px; padding:4px; margin-top:5px; border-radius:4px;">X</button>
            </div>
        `).join('');

        document.getElementById('arena-opp').innerHTML = mOpp.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${mOppIdx === i ? 'enemy-sel' : ''}" onclick="if(!${p.dead}) { mOppIdx=${i}; renderArena(); }">
                <img src="${p.img}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); mOpp[${i}].dead=true; if(mOppIdx==${i}) mOppIdx=null; renderArena();" class="btn-red" style="font-size:9px; padding:4px; margin-top:5px; border-radius:4px;">X</button>
            </div>
        `).join('');
        analyze();
    }

    function analyze() {
        const bar = document.getElementById('adv-box');
        if(mOppIdx === null) { bar.innerText = UI[lang].adv; return; }
        const alive = mTrio.filter(p => !p.dead);
        if(mMyIdx === null) {
            bar.innerText = UI[lang].swap + (alive[0] ? alive[0].name.toUpperCase() : "---");
        } else {
            bar.innerText = UI[lang].keep;
        }
    }

    function resetMatch() { mTrio = []; mOpp = []; loadMatchPrep(); }

    // --- SYS ---
    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'teams') renderTeamSelector();
    }
    function save() { localStorage.setItem('p_cba_box', JSON.stringify(box)); localStorage.setItem('p_cba_teams', JSON.stringify(teams)); }
    function setLang(l) { lang = l; trans(); }
    function trans() {
        const t = UI[lang];
        document.getElementById('ui-box-title').innerText = t.box;
        document.getElementById('ui-sel-title').innerText = t.sel;
        document.getElementById('ui-auto-btn').innerText = t.auto;
        document.getElementById('ui-save-btn').innerText = t.save;
        document.getElementById('ui-pick3-title').innerText = t.pick3;
        document.getElementById('ui-launch-btn').innerText = t.launch;
        analyze();
    }

    window.onload = init;
</script>
</body>
</html>
