<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Omni-Tool</title>
    <style>
        :root { --bg: #0b0f1a; --card: #161d2f; --accent: #f59e0b; --blue: #3b82f6; --red: #ef4444; --green: #10b981; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Nav & Tabs */
        nav { background: var(--card); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .tabs { display: flex; background: #000; padding: 4px; gap: 4px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #242f45; color: #94a3b8; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--bg); }

        /* Main Content */
        .content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content.active { display: block; }

        /* UI Elements */
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #2d3748; }
        .poke-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        .poke-item { background: #1f2937; border-radius: 8px; padding: 5px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; position: relative; }
        .poke-item:hover { border-color: var(--accent); transform: scale(1.05); }
        .poke-item img { width: 100%; height: auto; }
        .poke-item .name { font-size: 10px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        
        /* Draggable/Selectable Area */
        .drop-zone { border: 2px dashed #4b5563; border-radius: 12px; min-height: 100px; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        
        /* Battle Mode */
        .battle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .side-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #333; }
        .faint { filter: grayscale(1) opacity(0.4); }
        .active-poke { border-color: var(--green) !important; box-shadow: 0 0 15px var(--green); }
        .enemy-active { border-color: var(--red) !important; box-shadow: 0 0 15px var(--red); }
        
        /* Advisor Overlay */
        .advisor-box { background: var(--accent); color: #000; padding: 15px; border-radius: 8px; font-weight: 800; text-align: center; font-size: 1.1rem; margin-top: 20px; }

        input, select { background: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }

        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #1f2937; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="load-status">Pokémon Database Loading...</p>
</div>

<nav>
    <div id="ui-logo" style="font-size: 1.2rem; font-weight: 800; color: var(--accent);">CHAMPIONS PRO</div>
    <div style="display: flex; gap: 8px;">
        <button onclick="setLang('tr')" class="btn" style="padding:5px; background:#2d3748; color:white;">TR</button>
        <button onclick="setLang('en')" class="btn" style="padding:5px; background:#2d3748; color:white;">EN</button>
    </div>
</nav>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('box', this)">BOX</button>
    <button class="tab-btn" onclick="showTab('teams', this)">TEAMS</button>
    <button class="tab-btn" onclick="showTab('battle', this)">BATTLE</button>
</div>

<div id="box" class="content active">
    <div class="card">
        <input type="text" id="box-search" placeholder="Search Pokemon..." oninput="renderMasterList()">
        <div class="poke-grid" id="master-grid" style="margin-top:15px; max-height: 300px; overflow-y: auto;"></div>
    </div>
    <div class="card">
        <h3 id="ui-mybox-title">My Collection / Benim Kutum</h3>
        <div class="poke-grid" id="my-box-grid"></div>
    </div>
</div>

<div id="teams" class="content">
    <div class="card">
        <h3 id="ui-selector-title">Select from My Box</h3>
        <div class="poke-grid" id="team-selector-grid"></div>
    </div>
    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="team-name-in" placeholder="Team Name">
            <button onclick="suggestSix()" class="btn btn-primary" id="ui-suggest-btn">Auto Suggest</button>
        </div>
        <div class="drop-zone" id="current-team-zone"></div>
        <button onclick="saveTeam()" class="btn btn-success" style="width:100%; margin-top:10px;" id="ui-save-btn">Save Team</button>
    </div>
    <div id="saved-teams-container"></div>
</div>

<div id="battle" class="content">
    <div class="card">
        <select id="battle-team-select" onchange="startBattleSession()"></select>
    </div>
    <div class="battle-grid">
        <div class="card">
            <div class="side-title" style="color:var(--blue)">MY TEAM</div>
            <div class="poke-grid" id="battle-my-grid" style="grid-template-columns: 1fr 1fr;"></div>
            <button onclick="suggestTopThree()" class="btn btn-primary" style="width:100%; margin-top:10px;">Suggest 3</button>
        </div>
        <div class="card">
            <div class="side-title" style="color:var(--red)">OPPONENT</div>
            <input type="text" id="opp-search" list="all-pokes" placeholder="Add Enemy..." onchange="addEnemy(this.value)">
            <div class="poke-grid" id="battle-opp-grid" style="grid-template-columns: 1fr 1fr; margin-top:10px;"></div>
        </div>
    </div>
    <div class="advisor-box" id="battle-advisor">Ready for Battle!</div>
</div>

<datalist id="all-pokes"></datalist>

<script>
    // --- APP STATE ---
    let ALL_POKEMON = [];
    let myBox = JSON.parse(localStorage.getItem('myBox')) || [];
    let savedTeams = JSON.parse(localStorage.getItem('savedTeams')) || [];
    let currentBuild = [];
    let lang = 'tr';
    
    let battleSession = { myPokes: [], oppPokes: [], activeMy: null, activeOpp: null };

    const i18n = {
        tr: { myBox: "Koleksiyonum", selectBox: "Kutumdan Seç", suggest: "Tavsiye Et", save: "Takımı Kaydet", advReady: "Savaşa Hazır!", advSwap: "Değiştir: ", advKeep: "Avantajlısın, kal!" },
        en: { myBox: "My Collection", selectBox: "Select from My Box", suggest: "Auto Suggest", save: "Save Team", advReady: "Ready for Battle!", advSwap: "Swap to: ", advKeep: "Keep active!" }
    };

    // --- INIT ---
    async function init() {
        const cache = localStorage.getItem('pokeDb');
        if(cache) {
            ALL_POKEMON = JSON.parse(cache);
        } else {
            // Fetch all Gen 1-9 (approx 1025)
            const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
            const data = await res.json();
            ALL_POKEMON = data.results.map((p, i) => ({
                id: i + 1,
                name: p.name,
                sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i+1}.png`
            }));
            localStorage.setItem('pokeDb', JSON.stringify(ALL_POKEMON));
        }
        document.getElementById('loader').style.display = 'none';
        
        // Fill datalist for battle search
        document.getElementById('all-pokes').innerHTML = ALL_POKEMON.map(p => `<option value="${p.name}">`).join('');
        
        renderMasterList();
        renderMyBox();
        renderSavedTeams();
        updateLangUI();
        updateBattleSelectors();
    }

    // --- BOX LOGIC ---
    function renderMasterList() {
        const query = document.getElementById('box-search').value.toLowerCase();
        const grid = document.getElementById('master-grid');
        const filtered = ALL_POKEMON.filter(p => p.name.includes(query)).slice(0, 50);
        
        grid.innerHTML = filtered.map(p => `
            <div class="poke-item" onclick="addToMyBox(${p.id})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function addToMyBox(id) {
        const p = ALL_POKEMON.find(x => x.id === id);
        if(!myBox.find(x => x.id === id)) {
            myBox.push(p);
            saveData();
            renderMyBox();
            renderTeamSelector();
        }
    }

    function renderMyBox() {
        document.getElementById('my-box-grid').innerHTML = myBox.map((p, i) => `
            <div class="poke-item" onclick="removeFromMyBox(${i})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function removeFromMyBox(i) { myBox.splice(i, 1); saveData(); renderMyBox(); renderTeamSelector(); }

    // --- TEAM LOGIC ---
    function renderTeamSelector() {
        document.getElementById('team-selector-grid').innerHTML = myBox.map(p => `
            <div class="poke-item" onclick="addToCurrentTeam(${p.id})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function addToCurrentTeam(id) {
        if(currentBuild.length < 6) {
            const p = myBox.find(x => x.id === id);
            currentBuild.push({...p, buildId: Date.now()});
            renderBuildZone();
        }
    }

    function renderBuildZone() {
        document.getElementById('current-team-zone').innerHTML = currentBuild.map((p, i) => `
            <div class="poke-item" onclick="currentBuild.splice(${i},1); renderBuildZone();">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
            </div>
        `).join('');
    }

    function suggestSix() {
        if(myBox.length < 6) return alert("Box'ta en az 6 Pokemon olmalı!");
        currentBuild = [...myBox].sort(() => 0.5 - Math.random()).slice(0, 6);
        renderBuildZone();
    }

    function saveTeam() {
        const name = document.getElementById('team-name-in').value || `Team ${savedTeams.length + 1}`;
        savedTeams.push({ name, pokes: [...currentBuild] });
        currentBuild = [];
        saveData();
        renderSavedTeams();
        renderBuildZone();
        updateBattleSelectors();
    }

    function renderSavedTeams() {
        document.getElementById('saved-teams-container').innerHTML = savedTeams.map((t, i) => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>${t.name}</b>
                    <button class="btn btn-danger" onclick="deleteTeam(${i})" style="padding:2px 8px;">X</button>
                </div>
                <div class="poke-grid" style="margin-top:10px;">
                    ${t.pokes.map(p => `<img src="${p.sprite}" width="40">`).join('')}
                </div>
            </div>
        `).join('');
    }

    function deleteTeam(i) { savedTeams.splice(i, 1); saveData(); renderSavedTeams(); updateBattleSelectors(); }

    // --- BATTLE LOGIC ---
    function updateBattleSelectors() {
        const sel = document.getElementById('battle-team-select');
        sel.innerHTML = savedTeams.map((t, i) => `<option value="${i}">${t.name}</option>`).join('');
    }

    function startBattleSession() {
        const idx = document.getElementById('battle-team-select').value;
        if(!savedTeams[idx]) return;
        battleSession.myPokes = savedTeams[idx].pokes.map(p => ({...p, dead: false, active: false}));
        battleSession.oppPokes = [];
        battleSession.activeMy = null;
        battleSession.activeOpp = null;
        renderBattleUI();
    }

    function addEnemy(name) {
        const p = ALL_POKEMON.find(x => x.name === name.toLowerCase());
        if(p) {
            battleSession.oppPokes.push({...p, dead: false});
            document.getElementById('opp-search').value = "";
            renderBattleUI();
        }
    }

    function renderBattleUI() {
        // My Team
        document.getElementById('battle-my-grid').innerHTML = battleSession.myPokes.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${battleSession.activeMy === i ? 'active-poke' : ''}" onclick="setMyFocus(${i})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); killPoke('my', ${i})" class="btn-danger" style="font-size:8px; border:none; border-radius:2px;">DEAD</button>
            </div>
        `).join('');

        // Opponent
        document.getElementById('battle-opp-grid').innerHTML = battleSession.oppPokes.map((p, i) => `
            <div class="poke-item ${p.dead ? 'faint' : ''} ${battleSession.activeOpp === i ? 'enemy-active' : ''}" onclick="setOppFocus(${i})">
                <img src="${p.sprite}">
                <div class="name">${p.name}</div>
                <button onclick="event.stopPropagation(); killPoke('opp', ${i})" class="btn-danger" style="font-size:8px; border:none; border-radius:2px;">DEAD</button>
            </div>
        `).join('');
        
        runAdvisor();
    }

    function setMyFocus(i) { if(!battleSession.myPokes[i].dead) { battleSession.activeMy = i; renderBattleUI(); } }
    function setOppFocus(i) { if(!battleSession.oppPokes[i].dead) { battleSession.activeOpp = i; renderBattleUI(); } }

    function killPoke(side, i) {
        if(side === 'my') { 
            battleSession.myPokes[i].dead = true;
            if(battleSession.activeMy === i) battleSession.activeMy = null;
        } else {
            battleSession.oppPokes[i].dead = true;
            if(battleSession.activeOpp === i) battleSession.activeOpp = null;
        }
        renderBattleUI();
    }

    function suggestTopThree() {
        const alive = battleSession.myPokes.filter(p => !p.dead);
        alert("Suggesting Top 3: " + alive.slice(0,3).map(p => p.name).join(', '));
    }

    function runAdvisor() {
        const adv = document.getElementById('battle-advisor');
        if(battleSession.activeOpp === null) { adv.innerText = i18n[lang].advReady; return; }
        
        const alive = battleSession.myPokes.filter(p => !p.dead);
        if(battleSession.activeMy === null) {
            adv.innerText = i18n[lang].advSwap + (alive[0] ? alive[0].name.toUpperCase() : "N/A");
        } else {
            adv.innerText = i18n[lang].advKeep;
        }
    }

    // --- SYSTEM ---
    function showTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'teams') renderTeamSelector();
    }

    function setLang(l) { 
        lang = l; updateLangUI(); 
    }

    function updateLangUI() {
        const t = i18n[lang];
        document.getElementById('ui-mybox-title').innerText = t.myBox;
        document.getElementById('ui-selector-title').innerText = t.selectBox;
        document.getElementById('ui-suggest-btn').innerText = t.suggest;
        document.getElementById('ui-save-btn').innerText = t.save;
        runAdvisor();
    }

    function saveData() {
        localStorage.setItem('myBox', JSON.stringify(myBox));
        localStorage.setItem('savedTeams', JSON.stringify(savedTeams));
    }

    init();
</script>
</body>
</html>
